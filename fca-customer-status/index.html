<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FCA Customer Bid Status | Auricrux</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #111827;
      min-height: 100vh;
      padding: 24px;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero {
      color: white;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .hero p {
      margin: 0;
      color: #cbd5e1;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    button,
    .link {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      text-decoration: none;
      display: inline-block;
    }

    button:hover,
    .link:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: #334155;
    }

    .secondary:hover {
      background: #1e293b;
    }

    .status {
      color: #cbd5e1;
      font-weight: 700;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 22px;
      border-bottom: 1px solid #e5e7eb;
      background: #f8fafc;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .card-header h2 {
      margin: 0;
      font-size: 22px;
    }

    .meta {
      color: #6b7280;
      margin-top: 6px;
      font-size: 14px;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
      background: #e5e7eb;
      color: #374151;
    }

    .badge.reviewed {
      background: #dcfce7;
      color: #166534;
    }

    .badge.new {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .badge.high {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.medium {
      background: #fef3c7;
      color: #92400e;
    }

    .badge.low {
      background: #dcfce7;
      color: #166534;
    }

    .card-body {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .facts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .fact {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      background: #f9fafb;
    }

    .fact strong {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 5px;
    }

    .fact span {
      font-size: 16px;
      font-weight: 800;
    }

    .analysis {
      border-left: 5px solid #2563eb;
      background: #eff6ff;
      padding: 16px;
      border-radius: 12px;
      line-height: 1.55;
    }

    .next {
      border-left: 5px solid #16a34a;
      background: #f0fdf4;
      padding: 16px;
      border-radius: 12px;
      font-weight: 800;
      line-height: 1.5;
    }

    .scope {
      margin: 0;
      padding-left: 22px;
      line-height: 1.6;
    }

    .empty {
      background: white;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      color: #6b7280;
      font-weight: 700;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 14px;
      padding: 16px;
      font-weight: 800;
      white-space: pre-wrap;
    }

    .footer {
      color: #cbd5e1;
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .facts {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>FCA Customer Bid Status</h1>
      <p>View submitted bids, Auricrux analysis, risk, pricing direction, and next actions.</p>
    </section>

    <section class="toolbar">
      <div class="status" id="statusText">Loading bids...</div>
      <div>
        <a class="link secondary" href="../tyler-entry/index.html">Submit New Bid</a>
        <button id="refreshBtn" type="button">Refresh Status</button>
      </div>
    </section>

    <section id="bidGrid" class="grid"></section>

    <div class="footer">
      FCA Customer Bid Status — Auricrux execution layer
    </div>
  </main>

  <script>
    const API_BASE = "https://auricrux-bid-api-node-ftcueggjg4b0ehbs.centralus-01.azurewebsites.net/api/bids";

    const bidGrid = document.getElementById("bidGrid");
    const statusText = document.getElementById("statusText");
    const refreshBtn = document.getElementById("refreshBtn");

    function money(value) {
      return Number(value || 0).toLocaleString("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      });
    }

    function safeText(value, fallback) {
      return value && String(value).trim() ? value : fallback;
    }

    function statusBadgeClass(status) {
      if (status === "auricrux-reviewed") return "reviewed";
      return "new";
    }

    function riskBadgeClass(risk) {
      if (risk === "high") return "high";
      if (risk === "low") return "low";
      return "medium";
    }

    function renderBid(bid) {
      const scopeItems = Array.isArray(bid.auricruxScope)
        ? bid.auricruxScope.map(item => "<li>" + item + "</li>").join("")
        : "";

      const pricing = bid.auricruxPricing || {};

      return `
        <article class="card">
          <div class="card-header">
            <div>
              <h2>${safeText(bid.projectName, "Unnamed Project")}</h2>
              <div class="meta">
                ${safeText(bid.company, "Unknown Company")} · ${safeText(bid.trade, "Trade not specified")} · ${safeText(bid.location, "Location not specified")}
              </div>
            </div>

            <div class="badge-row">
              <span class="badge ${statusBadgeClass(bid.status)}">${safeText(bid.status, "new")}</span>
              <span class="badge ${riskBadgeClass(bid.auricruxRisk)}">Risk: ${safeText(bid.auricruxRisk, "pending")}</span>
              <span class="badge">Score: ${Number(bid.auricruxScore || 0)}/100</span>
            </div>
          </div>

          <div class="card-body">
            <div class="facts">
              <div class="fact">
                <strong>Estimated Value</strong>
                <span>${money(bid.value)}</span>
              </div>

              <div class="fact">
                <strong>Competitive Price</strong>
                <span>${money(pricing.competitive)}</span>
              </div>

              <div class="fact">
                <strong>Bid ID</strong>
                <span>${safeText(bid.id, "N/A")}</span>
              </div>
            </div>

            <div class="analysis">
              <strong>Auricrux Analysis</strong><br />
              ${safeText(bid.auricruxNarrative, bid.auricruxRecommendation || "Auricrux analysis pending.")}
            </div>

            <div class="next">
              Next Action: ${safeText(bid.nextAction, "Awaiting Auricrux review.")}
            </div>

            <div>
              <strong>Scope Review Path</strong>
              <ul class="scope">
                ${scopeItems || "<li>Scope review pending.</li>"}
              </ul>
            </div>
          </div>
        </article>
      `;
    }

    async function loadBids() {
      statusText.textContent = "Loading bids...";
      bidGrid.innerHTML = "";

      try {
        const response = await fetch(API_BASE);

        if (!response.ok) {
          throw new Error("API returned HTTP " + response.status);
        }

        const bids = await response.json();

        if (!Array.isArray(bids) || bids.length === 0) {
          statusText.textContent = "No bids found.";
          bidGrid.innerHTML = '<div class="empty">No bids have been submitted yet.</div>';
          return;
        }

        bids.sort(function (a, b) {
          return String(b.updatedAt || "").localeCompare(String(a.updatedAt || ""));
        });

        statusText.textContent = bids.length + " bid(s) loaded.";
        bidGrid.innerHTML = bids.map(renderBid).join("");
      } catch (error) {
        statusText.textContent = "Unable to load bids.";
        bidGrid.innerHTML = '<div class="error">Failed to load bid status: ' + error.message + '</div>';
      }
    }

    refreshBtn.addEventListener("click", loadBids);

    loadBids();
  </script>
</body>
</html>
