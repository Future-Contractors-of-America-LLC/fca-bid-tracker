<!doctype html>
<html>
<head><meta charset="utf-8"><title>System Evolution</title></head>
<body style="font-family:Arial;padding:24px">
<h1>System Evolution (Shipped Changes Only)</h1>
<p>This page updates only when real capability is shipped.</p>
<pre id="out" style="background:#f7f7f7;border:1px solid #ddd;padding:12px;border-radius:8px"></pre>
<script>
fetch('/product/evolution.json', { cache: 'no-store' })
  .then(r => r.json())
  .then(j => document.getElementById('out').textContent = JSON.stringify(j, null, 2))
  .catch(() => document.getElementById('out').textContent = 'No shipped evolution record yet.');
</script>
<a href="/product/">Back to Product Shell</a>
</body>
</html>
