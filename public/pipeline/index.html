<!doctype html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FCA Pipeline</title>
<style>
body{font-family:Arial;padding:24px;max-width:1100px;margin:auto}
pre{background:#f7f7f7;border:1px solid #ddd;padding:12px;border-radius:10px;overflow:auto}
</style>
</head>
<body>
<h1>FCA Pipeline (Customer-State + Proof)</h1>
<p>This is a live view of pipeline state generated by Auricrux.</p>
<pre id="out">Loading...</pre>
<script>
fetch('/auricrux/pipeline/pipeline.json', { cache:'no-store' })
  .then(r => r.json())
  .then(j => out.textContent = JSON.stringify(j, null, 2))
  .catch(() => out.textContent = "Pipeline not generated yet.");
</script>
<p>Back to product shell: /product/</p>
</body>
</html>
