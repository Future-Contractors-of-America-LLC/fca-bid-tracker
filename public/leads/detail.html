<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="0; url=/portal/leads" />
  <title>Redirecting to Lead Intelligence</title>
  <script>
    var params = new URLSearchParams(window.location.search);
    var leadId = params.get("leadId") || params.get("id");
    var target = leadId ? "/portal/leads?leadId=" + encodeURIComponent(leadId) : "/portal/leads";
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Redirecting to <a href="/portal/leads">Lead Intelligence</a>…</p>
</body>
</html>
