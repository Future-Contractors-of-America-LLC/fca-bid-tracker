<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>FCA Bid System</title>
</head>
<body>

<h2>FCA Bid Entry</h2>

<input id="project" placeholder="Project Name"><br><br>
<input id="client" placeholder="Client"><br><br>
<input id="amount" placeholder="Amount"><br><br>

<button onclick="submitBid()">Submit Bid</button>

<p id="msg"></p>

<hr>

<h3>Submitted Bids</h3>
<div id="bids"></div>

<script>
async function submitBid() {
  let data = {
    id: new Date().toISOString(),
    company: "FCA Customer",
    project: document.getElementById("project").value,
    client: document.getElementById("client").value,
    amount: document.getElementById("amount").value,
    status: "Active"
  };

  let res = await fetch("/api/bids", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  document.getElementById("msg").innerText =
    res.ok ? "✅ Bid submitted" : "❌ Error";

  loadBids();
}

async function loadBids() {
  try {
    let res = await fetch("/api/bids");

    let raw = await res.text();
    let bids = [];

    try {
      bids = JSON.parse(raw);
    } catch {
      bids = [];
    }

    let container = document.getElementById("bids");
    container.innerHTML = "";

    if (!bids || bids.length === 0) {
      container.innerHTML = "<p>No bids yet</p>";
      return;
    }

    bids.forEach(b => {
      container.innerHTML += `
        <div style="margin-bottom:10px;">
          <b>${b.project}</b> — ${b.client} — $${b.amount} — ${b.status}
        </div>
      `;
    });

  } catch (err) {
    document.getElementById("bids").innerHTML = "Error loading bids";
    console.error(err);
  }
}

loadBids();
</script>

</body>
</html>
