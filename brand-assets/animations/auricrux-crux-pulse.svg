<!-- Auricrux Crux Pulse - motion mark candidate (3s loop). Export to MP4/GIF for USPTO motion specimen. -->
<svg width="512" height="512" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pulseGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(60 60) rotate(90) scale(58)">
      <stop stop-color="#FFF4D1">
        <animate attributeName="stop-color" values="#FFF4D1;#FFE08A;#FFF4D1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#D49A22">
        <animate attributeName="stop-opacity" values="1;0.82;1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#8A5A12"/>
    </radialGradient>
    <linearGradient id="cruxFill" x1="60" y1="34" x2="60" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2C1803"/>
      <stop offset="1" stop-color="#5A320A"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="52" fill="url(#pulseGlow)" stroke="#B77912" stroke-width="4">
    <animate attributeName="r" values="51;53;51" dur="3s" repeatCount="indefinite"/>
  </circle>
  <path d="M60 33L66 45L79 46L69 55L72 68L60 62L48 68L51 55L41 46L54 45L60 33Z" fill="#FFE9A4" fill-opacity="0.7" stroke="#7C5313" stroke-width="2"/>
  <path d="M60 40L67 49V58L60 66L53 58V49L60 40Z" fill="url(#cruxFill)">
    <animateTransform attributeName="transform" type="scale" values="1;1.06;1" dur="3s" repeatCount="indefinite" additive="sum" transform-origin="60 53"/>
  </path>
  <path d="M60 66V84" stroke="url(#cruxFill)" stroke-width="7" stroke-linecap="round" opacity="0.95">
    <animate attributeName="stroke-width" values="7;8.5;7" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M47 71H73" stroke="url(#cruxFill)" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
</svg>
