name: Generic Free Test Deploy

on:
  push:
    branches:
      - backup/full-system-preserve-20260705-223752
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: generic-free-test-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static test bundle (isolated)
        env:
          AURICRUX_PRIMARY_DOMAIN: localhost
          AURICRUX_DEPLOY_DEFAULT_HOST: localhost
          AURICRUX_EXPECTED_HOSTS: localhost
        run: npm run build

      - name: Add SPA fallback for GitHub Pages
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
