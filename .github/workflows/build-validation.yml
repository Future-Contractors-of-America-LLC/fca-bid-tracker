name: FCA Build Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fca-build-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run governed build validation
        run: npm run build:system

      - name: Generate product readiness evidence
        if: ${{ always() }}
        run: npm run generate:product-readiness-report

      - name: Generate academy catalog evidence
        if: ${{ always() }}
        run: npm run generate:academy-catalog-report

      - name: Publish product readiness summary
        if: ${{ always() }}
        run: |
          if [ -f generated/product-readiness-report.md ]; then
            cat generated/product-readiness-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Product readiness report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/academy-catalog-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/academy-catalog-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Academy catalog report missing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload product readiness artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: fca-product-readiness-${{ github.run_id }}
          path: |
            generated/product-readiness-report.json
            generated/product-readiness-report.md
            generated/academy-catalog-report.json
            generated/academy-catalog-report.md
          if-no-files-found: warn

