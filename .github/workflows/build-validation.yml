name: FCA Build Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fca-build-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run governed build validation
        run: npm run build:system

      - name: Validate managed auth and commercial runtime
        if: ${{ always() }}
        run: npm run validate:managed-auth-commercial-runtime

      - name: Validate runtime proof integrity
        if: ${{ always() }}
        run: npm run validate:runtime-proof-integrity

      - name: Capture build evidence index
        if: ${{ always() }}
        run: npm run capture:build-evidence

      - name: Validate build proof lane
        if: ${{ always() }}
        run: npm run validate:build-proof-lane

      - name: Validate packet letter lock
        if: ${{ always() }}
        run: npm run validate:packet-letter-lock

      - name: Verify live deployment
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        env:
          AURICRUX_SWA_DEFAULT_HOST: delightful-mushroom-0de67860f.7.azurestaticapps.net
        run: npm run verify:live-deployment

      - name: Generate product readiness evidence
        if: ${{ always() }}
        run: npm run generate:product-readiness-report

      - name: Generate academy catalog evidence
        if: ${{ always() }}
        run: npm run generate:academy-catalog-report

      - name: Generate managed auth and commercial runtime evidence
        if: ${{ always() }}
        run: npm run generate:managed-auth-commercial-runtime-report

      - name: Generate runtime proof integrity evidence
        if: ${{ always() }}
        run: npm run generate:runtime-proof-integrity-report

      - name: Generate build proof lane evidence
        if: ${{ always() }}
        run: npm run generate:build-proof-lane-report

      - name: Generate packet letter lock evidence
        if: ${{ always() }}
        run: npm run generate:packet-letter-lock-report

      - name: Generate operations pipeline evidence
        if: ${{ always() }}
        run: npm run generate:operations-pipeline-report

      - name: Generate website market-readiness evidence
        if: ${{ always() }}
        run: npm run generate:website-market-readiness-report

      - name: Generate file governance evidence
        if: ${{ always() }}
        run: npm run generate:file-governance-report

      - name: Generate billing governance evidence
        if: ${{ always() }}
        run: npm run generate:billing-governance-report

      - name: Generate support governance evidence
        if: ${{ always() }}
        run: npm run generate:support-governance-report

      - name: Generate admin governance evidence
        if: ${{ always() }}
        run: npm run generate:admin-governance-report

      - name: Validate live deployment proof commit signal
        if: ${{ always() }}
        run: npm run validate:live-deployment-proof-commit-signal

      - name: Generate live deployment proof commit signal report
        if: ${{ always() }}
        run: npm run generate:live-deployment-proof-commit-signal-report

      - name: Validate live deployment witness commit observation
        if: ${{ always() }}
        run: npm run validate:live-deployment-witness-commit-observation

      - name: Generate live deployment witness commit observation report
        if: ${{ always() }}
        run: npm run generate:live-deployment-witness-commit-observation-report

      - name: Validate live deployment CI proof commit observation
        if: ${{ always() }}
        run: npm run validate:live-deployment-ci-proof-commit-observation

      - name: Generate live deployment CI proof commit observation report
        if: ${{ always() }}
        run: npm run generate:live-deployment-ci-proof-commit-observation-report

      - name: Validate live deployment proof suite
        if: ${{ always() }}
        run: npm run validate:live-deployment-proof-suite

      - name: Generate live deployment proof suite report
        if: ${{ always() }}
        run: npm run generate:live-deployment-proof-suite-report

