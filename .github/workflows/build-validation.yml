name: FCA Build Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fca-build-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout auricrux-central (academy catalog balance)
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          repository: Future-Contractors-of-America-LLC/auricrux-central
          path: auricrux-central-work
          token: ${{ secrets.AURICRUX_GITHUB_TOKEN }}

      - name: Run SaaS quality control
        env:
          FCA_API_BASE: https://api.futurecontractorsofamerica.com
          FCA_CENTRAL_ROOT: ${{ github.workspace }}/auricrux-central-work
          FCA_SKIP_REDUNDANT_BUILD: "1"
        run: npm run qc:saas

      - name: Run LMS depth quality control
        env:
          FCA_API_BASE: https://auricrux-central.azurewebsites.net
          FCA_CENTRAL_ROOT: ${{ github.workspace }}/auricrux-central-work
        run: npm run qc:lms

      - name: Run governed build validation
        run: npm run build:system

      - name: Validate managed auth and commercial runtime
        if: ${{ always() }}
        run: npm run validate:managed-auth-commercial-runtime

      - name: Validate runtime proof integrity
        if: ${{ always() }}
        run: npm run validate:runtime-proof-integrity

      - name: Capture build evidence index
        if: ${{ always() }}
        run: npm run capture:build-evidence

      - name: Validate build proof lane
        if: ${{ always() }}
        run: npm run validate:build-proof-lane

      - name: Validate packet letter lock
        if: ${{ always() }}
        run: npm run validate:packet-letter-lock

      - name: Verify live deployment
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        env:
          AURICRUX_SWA_DEFAULT_HOST: delightful-mushroom-0de67860f.7.azurestaticapps.net
          AURICRUX_EXPECTED_HOSTS: futurecontractorsofamerica.com,www.futurecontractorsofamerica.com,app.futurecontractorsofamerica.com,delightful-mushroom-0de67860f.7.azurestaticapps.net
        run: npm run verify:live-deployment || true

      - name: Generate product readiness evidence
        if: ${{ always() }}
        run: npm run generate:product-readiness-report

      - name: Generate academy catalog evidence
        if: ${{ always() }}
        run: npm run generate:academy-catalog-report

      - name: Validate academy Auricrux media coverage
        if: ${{ always() }}
        run: node scripts/validate-academy-media.mjs

      - name: Generate managed auth and commercial runtime evidence
        if: ${{ always() }}
        run: npm run generate:managed-auth-commercial-runtime-report

      - name: Generate runtime proof integrity evidence
        if: ${{ always() }}
        run: npm run generate:runtime-proof-integrity-report

      - name: Generate build proof lane evidence
        if: ${{ always() }}
        run: npm run generate:build-proof-lane-report

      - name: Generate packet letter lock evidence
        if: ${{ always() }}
        run: npm run generate:packet-letter-lock-report

      - name: Generate operations pipeline evidence
        if: ${{ always() }}
        run: npm run generate:operations-pipeline-report

      - name: Generate website market-readiness evidence
        if: ${{ always() }}
        run: npm run generate:website-market-readiness-report

      - name: Generate file governance evidence
        if: ${{ always() }}
        run: npm run generate:file-governance-report

      - name: Generate billing governance evidence
        if: ${{ always() }}
        run: npm run generate:billing-governance-report

      - name: Generate support governance evidence
        if: ${{ always() }}
        run: npm run generate:support-governance-report

      - name: Generate admin governance evidence
        if: ${{ always() }}
        run: npm run generate:admin-governance-report

      - name: Validate live deployment proof commit signal
        if: ${{ always() }}
        run: npm run validate:live-deployment-proof-commit-signal || true

      - name: Generate live deployment proof commit signal report
        if: ${{ always() }}
        run: npm run generate:live-deployment-proof-commit-signal-report

      - name: Validate live deployment witness commit observation
        if: ${{ always() }}
        run: npm run validate:live-deployment-witness-commit-observation || true

      - name: Generate live deployment witness commit observation report
        if: ${{ always() }}
        run: npm run generate:live-deployment-witness-commit-observation-report

      - name: Validate live deployment CI proof commit observation
        if: ${{ always() }}
        run: npm run validate:live-deployment-ci-proof-commit-observation || true

      - name: Generate live deployment CI proof commit observation report
        if: ${{ always() }}
        run: npm run generate:live-deployment-ci-proof-commit-observation-report

      - name: Validate live deployment current head verifier
        if: ${{ always() }}
        run: npm run validate:live-deployment-current-head-verifier || true

      - name: Generate live deployment current head verifier report
        if: ${{ always() }}
        run: npm run generate:live-deployment-current-head-verifier-report

      - name: Validate live deployment metadata transition state
        if: ${{ always() }}
        run: npm run validate:live-deployment-metadata-transition-state || true

      - name: Generate live deployment metadata transition state report
        if: ${{ always() }}
        run: npm run generate:live-deployment-metadata-transition-state-report

      - name: Validate live deployment proof suite
        if: ${{ always() }}
        run: npm run validate:live-deployment-proof-suite || true

      - name: Generate live deployment proof suite report
        if: ${{ always() }}
        run: npm run generate:live-deployment-proof-suite-report

      - name: Validate live deployment proof bundle readiness
        if: ${{ always() }}
        run: npm run validate:live-deployment-proof-bundle-readiness || true

      - name: Generate live deployment proof bundle readiness report
        if: ${{ always() }}
        run: npm run generate:live-deployment-proof-bundle-readiness-report

      - name: Validate build validation live proof coverage
        if: ${{ always() }}
        run: npm run validate:build-validation-live-proof-coverage

      - name: Generate build validation live proof coverage report
        if: ${{ always() }}
        run: npm run generate:build-validation-live-proof-coverage-report

      - name: Validate live proof stamp coverage
        if: ${{ always() }}
        run: npm run validate:live-proof-stamp-coverage

      - name: Generate live proof stamp coverage report
        if: ${{ always() }}
        run: npm run generate:live-proof-stamp-coverage-report

      - name: Validate build validation live proof persistence wiring
        if: ${{ always() }}
        run: npm run validate:build-validation-live-proof-persistence-wiring

      - name: Generate build validation live proof persistence wiring report
        if: ${{ always() }}
        run: npm run generate:build-validation-live-proof-persistence-wiring-report

      - name: Validate live proof stamp persistence wiring
        if: ${{ always() }}
        run: npm run validate:live-proof-stamp-persistence-wiring

      - name: Generate live proof stamp persistence wiring report
        if: ${{ always() }}
        run: npm run generate:live-proof-stamp-persistence-wiring-report

      - name: Validate live proof persisted artifact surface
        if: ${{ always() }}
        run: npm run validate:live-proof-persisted-artifact-surface || true

      - name: Generate live proof persisted artifact surface report
        if: ${{ always() }}
        run: npm run generate:live-proof-persisted-artifact-surface-report

      - name: Validate live proof persisted control bundle
        if: ${{ always() }}
        run: npm run validate:live-proof-persisted-control-bundle || true

      - name: Generate live proof persisted control bundle report
        if: ${{ always() }}
        run: npm run generate:live-proof-persisted-control-bundle-report

      - name: Validate live proof witness observed state
        if: ${{ always() }}
        run: npm run validate:live-proof-witness-observed-state || true

      - name: Generate live proof witness observed state report
        if: ${{ always() }}
        run: npm run generate:live-proof-witness-observed-state-report

      - name: Validate live proof split state
        if: ${{ always() }}
        run: npm run validate:live-proof-split-state || true

      - name: Generate live proof split state report
        if: ${{ always() }}
        run: npm run generate:live-proof-split-state-report

      - name: Validate first persisted control run gate
        if: ${{ always() }}
        run: npm run validate:first-persisted-control-run-gate || true

      - name: Generate first persisted control run gate report
        if: ${{ always() }}
        run: npm run generate:first-persisted-control-run-gate-report

      - name: Upload build-validation proof bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: build-validation-proof-bundle
          path: |
            generated/runtime-proof-integrity-report.json
            generated/runtime-proof-integrity-report.md
            generated/build-proof-lane-report.json
            generated/build-proof-lane-report.md
            generated/build-validation-live-proof-coverage-validation.json
            generated/build-validation-live-proof-coverage-validation.md
            generated/build-validation-live-proof-coverage-report.json
            generated/build-validation-live-proof-coverage-report.md
            generated/build-validation-live-proof-persistence-wiring-validation.json
            generated/build-validation-live-proof-persistence-wiring-validation.md
            generated/build-validation-live-proof-persistence-wiring-report.json
            generated/build-validation-live-proof-persistence-wiring-report.md
            generated/live-proof-stamp-coverage-validation.json
            generated/live-proof-stamp-coverage-validation.md
            generated/live-proof-stamp-coverage-report.json
            generated/live-proof-stamp-coverage-report.md
            generated/live-proof-stamp-persistence-wiring-validation.json
            generated/live-proof-stamp-persistence-wiring-validation.md
            generated/live-proof-stamp-persistence-wiring-report.json
            generated/live-proof-stamp-persistence-wiring-report.md
            generated/live-deployment-current-head-verifier-validation.json
            generated/live-deployment-current-head-verifier-validation.md
            generated/live-deployment-current-head-verifier-report.json
            generated/live-deployment-current-head-verifier-report.md
            generated/live-deployment-metadata-transition-state-validation.json
            generated/live-deployment-metadata-transition-state-validation.md
            generated/live-deployment-metadata-transition-state-report.json
            generated/live-deployment-metadata-transition-state-report.md
            generated/live-deployment-proof-bundle-readiness-validation.json
            generated/live-deployment-proof-bundle-readiness-validation.md
            generated/live-deployment-proof-bundle-readiness-report.json
            generated/live-deployment-proof-bundle-readiness-report.md
            docs/runtime-proof/build-validation/build-proof-lane-report.json
            docs/runtime-proof/build-validation/build-proof-lane-report.md
            docs/runtime-proof/live-deployment/build-validation-live-proof-coverage-validation.json
            docs/runtime-proof/live-deployment/build-validation-live-proof-coverage-validation.md
            docs/runtime-proof/live-deployment/build-validation-live-proof-coverage-report.json
            docs/runtime-proof/live-deployment/build-validation-live-proof-coverage-report.md
            docs/runtime-proof/live-deployment/build-validation-live-proof-persistence-wiring-validation.json
            docs/runtime-proof/live-deployment/build-validation-live-proof-persistence-wiring-validation.md
            docs/runtime-proof/live-deployment/build-validation-live-proof-persistence-wiring-report.json
            docs/runtime-proof/live-deployment/build-validation-live-proof-persistence-wiring-report.md
            docs/runtime-proof/live-deployment/live-deployment-current-head-verifier-validation.json
            docs/runtime-proof/live-deployment/live-deployment-current-head-verifier-validation.md
            docs/runtime-proof/live-deployment/live-deployment-current-head-verifier-report.json
            docs/runtime-proof/live-deployment/live-deployment-current-head-verifier-report.md
            docs/runtime-proof/live-deployment/live-deployment-metadata-transition-state-validation.json
            docs/runtime-proof/live-deployment/live-deployment-metadata-transition-state-validation.md
            docs/runtime-proof/live-deployment/live-deployment-metadata-transition-state-report.json
            docs/runtime-proof/live-deployment/live-deployment-metadata-transition-state-report.md
            docs/runtime-proof/live-deployment/live-deployment-proof-bundle-readiness-validation.json
            docs/runtime-proof/live-deployment/live-deployment-proof-bundle-readiness-validation.md
            docs/runtime-proof/live-deployment/live-deployment-proof-bundle-readiness-report.json
            docs/runtime-proof/live-deployment/live-deployment-proof-bundle-readiness-report.md
            docs/runtime-proof/live-deployment/live-proof-stamp-coverage-validation.json
            docs/runtime-proof/live-deployment/live-proof-stamp-coverage-validation.md
            docs/runtime-proof/live-deployment/live-proof-stamp-coverage-report.json
            docs/runtime-proof/live-deployment/live-proof-stamp-coverage-report.md
            docs/runtime-proof/live-deployment/live-proof-stamp-persistence-wiring-validation.json
            docs/runtime-proof/live-deployment/live-proof-stamp-persistence-wiring-validation.md
            docs/runtime-proof/live-deployment/live-proof-stamp-persistence-wiring-report.json
            docs/runtime-proof/live-deployment/live-proof-stamp-persistence-wiring-report.md
          if-no-files-found: warn
