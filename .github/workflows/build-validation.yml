name: FCA Build Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fca-build-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run governed build validation
        run: npm run build:system

      - name: Validate managed auth and commercial runtime
        if: ${{ always() }}
        run: npm run validate:managed-auth-commercial-runtime

      - name: Capture build evidence index
        if: ${{ always() }}
        run: |
          npm run capture:build-evidence

      - name: Verify live deployment
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        env:
          AURICRUX_SWA_DEFAULT_HOST: delightful-mushroom-0de67860f.7.azurestaticapps.net
        run: npm run verify:live-deployment

      - name: Generate product readiness evidence
        if: ${{ always() }}
        run: npm run generate:product-readiness-report

      - name: Generate academy catalog evidence
        if: ${{ always() }}
        run: npm run generate:academy-catalog-report

      - name: Generate managed auth and commercial runtime evidence
        if: ${{ always() }}
        run: npm run generate:managed-auth-commercial-runtime-report

      - name: Generate operations pipeline evidence
        if: ${{ always() }}
        run: npm run generate:operations-pipeline-report

      - name: Generate website market-readiness evidence
        if: ${{ always() }}
        run: npm run generate:website-market-readiness-report

      - name: Generate file governance evidence
        if: ${{ always() }}
        run: npm run generate:file-governance-report

      - name: Generate billing governance evidence
        if: ${{ always() }}
        run: npm run generate:billing-governance-report

      - name: Generate support governance evidence
        if: ${{ always() }}
        run: npm run generate:support-governance-report

      - name: Generate admin governance evidence
        if: ${{ always() }}
        run: npm run generate:admin-governance-report

      - name: Persist build proof artifacts into repo
        if: ${{ always() }}
        run: |
          mkdir -p docs/runtime-proof/build-validation
          mkdir -p docs/runtime-proof/live-deployment
          cp generated/build-evidence-report.json docs/runtime-proof/build-validation/build-evidence-report.json || true
          cp generated/build-evidence-report.md docs/runtime-proof/build-validation/build-evidence-report.md || true
          cp generated/product-readiness-report.json docs/runtime-proof/build-validation/product-readiness-report.json || true
          cp generated/product-readiness-report.md docs/runtime-proof/build-validation/product-readiness-report.md || true
          cp generated/academy-catalog-report.json docs/runtime-proof/build-validation/academy-catalog-report.json || true
          cp generated/academy-catalog-report.md docs/runtime-proof/build-validation/academy-catalog-report.md || true
          cp generated/managed-auth-commercial-runtime-report.json docs/runtime-proof/build-validation/managed-auth-commercial-runtime-report.json || true
          cp generated/managed-auth-commercial-runtime-report.md docs/runtime-proof/build-validation/managed-auth-commercial-runtime-report.md || true
          cp generated/operations-pipeline-report.json docs/runtime-proof/build-validation/operations-pipeline-report.json || true
          cp generated/operations-pipeline-report.md docs/runtime-proof/build-validation/operations-pipeline-report.md || true
          cp generated/website-market-readiness-report.json docs/runtime-proof/build-validation/website-market-readiness-report.json || true
          cp generated/website-market-readiness-report.md docs/runtime-proof/build-validation/website-market-readiness-report.md || true
          cp generated/file-governance-report.json docs/runtime-proof/build-validation/file-governance-report.json || true
          cp generated/file-governance-report.md docs/runtime-proof/build-validation/file-governance-report.md || true
          cp generated/billing-governance-report.json docs/runtime-proof/build-validation/billing-governance-report.json || true
          cp generated/billing-governance-report.md docs/runtime-proof/build-validation/billing-governance-report.md || true
          cp generated/support-governance-report.json docs/runtime-proof/build-validation/support-governance-report.json || true
          cp generated/support-governance-report.md docs/runtime-proof/build-validation/support-governance-report.md || true
          cp generated/admin-governance-report.json docs/runtime-proof/build-validation/admin-governance-report.json || true
          cp generated/admin-governance-report.md docs/runtime-proof/build-validation/admin-governance-report.md || true
          cp workspace/live_deployment_smoke_summary.json docs/runtime-proof/live-deployment/live_deployment_smoke_summary.json || true
          cp workspace/live_deployment_smoke_failures.txt docs/runtime-proof/live-deployment/live_deployment_smoke_failures.txt || true

      - name: Publish product readiness summary
        if: ${{ always() }}
        run: |
          if [ -f generated/product-readiness-report.md ]; then
            cat generated/product-readiness-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Product readiness report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/academy-catalog-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/academy-catalog-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Academy catalog report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/managed-auth-commercial-runtime-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/managed-auth-commercial-runtime-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Managed auth and commercial runtime report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/operations-pipeline-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/operations-pipeline-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Operations pipeline report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/website-market-readiness-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/website-market-readiness-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Website market-readiness report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/file-governance-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/file-governance-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "File governance report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/billing-governance-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/billing-governance-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Billing governance report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/support-governance-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/support-governance-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Support governance report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/admin-governance-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/admin-governance-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Admin governance report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f workspace/live_deployment_smoke_failures.txt ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Live deployment smoke failures" >> "$GITHUB_STEP_SUMMARY"
            cat workspace/live_deployment_smoke_failures.txt >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload product readiness artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: fca-product-readiness-${{ github.run_id }}
          path: |
            generated/product-readiness-report.json
            generated/product-readiness-report.md
            generated/academy-catalog-report.json
            generated/academy-catalog-report.md
            generated/managed-auth-commercial-runtime-report.json
            generated/managed-auth-commercial-runtime-report.md
            generated/operations-pipeline-report.json
            generated/operations-pipeline-report.md
            generated/website-market-readiness-report.json
            generated/website-market-readiness-report.md
            generated/file-governance-report.json
            generated/file-governance-report.md
            generated/billing-governance-report.json
            generated/billing-governance-report.md
            generated/support-governance-report.json
            generated/support-governance-report.md
            generated/admin-governance-report.json
            generated/admin-governance-report.md
            generated/build-evidence-report.json
            generated/build-evidence-report.md
            workspace/live_deployment_smoke_summary.json
            workspace/live_deployment_smoke_failures.txt
          if-no-files-found: warn

      - name: Commit build proof artifacts
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "auricrux-ci"
          git config user.email "auricrux-ci@futurecontractorsofamerica.com"
          git add docs/runtime-proof/build-validation docs/runtime-proof/live-deployment
          if git diff --cached --quiet; then
            echo "No build proof artifact changes to commit."
          else
            git commit -m "Persist build validation and live deployment proof artifacts for run ${GITHUB_RUN_ID}"
            git push
          fi

# retrigger: 2026-06-08T18:05:00Z
