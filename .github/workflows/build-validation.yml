      - name: Generate live proof stamp persistence wiring report
        if: ${{ always() }}
        run: npm run generate:live-proof-stamp-persistence-wiring-report

      - name: Validate live proof persisted artifact surface
        if: ${{ always() }}
        run: npm run validate:live-proof-persisted-artifact-surface

      - name: Generate live proof persisted artifact surface report
        if: ${{ always() }}
        run: npm run generate:live-proof-persisted-artifact-surface-report

      - name: Validate live proof persisted control bundle
        if: ${{ always() }}
        run: npm run validate:live-proof-persisted-control-bundle

      - name: Generate live proof persisted control bundle report
        if: ${{ always() }}
        run: npm run generate:live-proof-persisted-control-bundle-report

      - name: Validate live proof witness observed state
        if: ${{ always() }}
        run: npm run validate:live-proof-witness-observed-state

      - name: Generate live proof witness observed state report
        if: ${{ always() }}
        run: npm run generate:live-proof-witness-observed-state-report

      - name: Validate live proof split state
        if: ${{ always() }}
        run: npm run validate:live-proof-split-state

      - name: Generate live proof split state report
        if: ${{ always() }}
        run: npm run generate:live-proof-split-state-report

      - name: Validate first persisted control run gate
        if: ${{ always() }}
        run: npm run validate:first-persisted-control-run-gate

      - name: Generate first persisted control run gate report
        if: ${{ always() }}
        run: npm run generate:first-persisted-control-run-gate-report

      - name: Persist build proof artifacts into repo
        if: ${{ always() }}
        run: |
          mkdir -p docs/runtime-proof/build-validation
          mkdir -p docs/runtime-proof/live-deployment
          cp generated/build-evidence-report.json docs/runtime-proof/build-validation/build-evidence-report.json || true
          cp generated/build-evidence-report.md docs/runtime-proof/build-validation/build-evidence-report.md || true
          cp generated/build-proof-lane-validation.json docs/runtime-proof/build-validation/build-proof-lane-validation.json || true
          cp generated/build-proof-lane-validation.md docs/runtime-proof/build-validation/build-proof-lane-validation.md || true
