        if: ${{ always() }}
        run: npm run generate:build-proof-ci-rewrite-transition-report

      - name: Publish product readiness summary
        if: ${{ always() }}
        run: |
          if [ -f generated/build-proof-ci-provenance-stamp.md ]; then
            cat generated/build-proof-ci-provenance-stamp.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/build-proof-provenance-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/build-proof-provenance-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/build-proof-ci-rewrite-transition-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/build-proof-ci-rewrite-transition-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/live-deployment-proof-suite-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/live-deployment-proof-suite-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/live-deployment-proof-bundle-readiness-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/live-deployment-proof-bundle-readiness-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/managed-auth-commercial-runtime-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/managed-auth-commercial-runtime-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/academy-catalog-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/academy-catalog-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

