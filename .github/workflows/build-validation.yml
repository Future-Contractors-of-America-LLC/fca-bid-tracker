          cp generated/runtime-proof-integrity-report.md docs/runtime-proof/build-validation/runtime-proof-integrity-report.md || true
          cp generated/operations-pipeline-report.json docs/runtime-proof/build-validation/operations-pipeline-report.json || true
          cp generated/operations-pipeline-report.md docs/runtime-proof/build-validation/operations-pipeline-report.md || true
          cp generated/website-market-readiness-report.json docs/runtime-proof/build-validation/website-market-readiness-report.json || true
          cp generated/website-market-readiness-report.md docs/runtime-proof/build-validation/website-market-readiness-report.md || true
          cp generated/file-governance-report.json docs/runtime-proof/build-validation/file-governance-report.json || true
          cp generated/file-governance-report.md docs/runtime-proof/build-validation/file-governance-report.md || true
