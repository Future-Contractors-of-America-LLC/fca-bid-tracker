      - name: Generate live deployment proof bundle readiness report
        if: ${{ always() }}
        run: npm run generate:live-deployment-proof-bundle-readiness-report

      - name: Validate build validation live proof coverage
        if: ${{ always() }}
        run: npm run validate:build-validation-live-proof-coverage

      - name: Generate build validation live proof coverage report
        if: ${{ always() }}
        run: npm run generate:build-validation-live-proof-coverage-report

      - name: Validate live proof stamp coverage
        if: ${{ always() }}
