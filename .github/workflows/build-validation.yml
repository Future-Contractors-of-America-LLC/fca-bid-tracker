          cp generated/build-proof-lane-report.md docs/runtime-proof/build-validation/build-proof-lane-report.md || true
          cp generated/packet-letter-lock-validation.json docs/runtime-proof/build-validation/packet-letter-lock-validation.json || true
          cp generated/packet-letter-lock-validation.md docs/runtime-proof/build-validation/packet-letter-lock-validation.md || true
          cp generated/packet-letter-lock-report.json docs/runtime-proof/build-validation/packet-letter-lock-report.json || true
