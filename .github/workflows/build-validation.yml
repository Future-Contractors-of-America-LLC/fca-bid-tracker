      - name: Commit build proof artifacts
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "auricrux-ci"
          git config user.email "auricrux-ci@futurecontractorsofamerica.com"
          git add docs/runtime-proof/build-validation docs/runtime-proof/live-deployment
          if git diff --cached --quiet; then
            echo "No build proof artifact changes to commit."
          else
            git commit -m "Persist build validation and live deployment proof artifacts for run ${GITHUB_RUN_ID}"
            git push
          fi
