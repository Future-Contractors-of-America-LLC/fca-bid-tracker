name: Auricrux Executive Operator

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Optional executive command for this run"
        required: false
        type: string
        default: ""
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auricrux-executive-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Auricrux Executive Engine
        env:
          AURICRUX_COMMAND: ${{ github.event.inputs.command || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GH_TOKEN: ${{ secrets.AURICRUX_GITHUB_TOKEN }}
        run: node auricrux/exec/index.mjs

      - name: Create or Update PR
        if: success()
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AURICRUX_GITHUB_TOKEN }}
          commit-message: "Auricrux: system advancement"
          title: "Auricrux: system advancement"
          body: "Autonomous system advancement executed by Auricrux."
          branch: "auricrux/executive"
          base: "main"
          labels: "auricrux-automerge"
