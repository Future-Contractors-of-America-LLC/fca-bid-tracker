name: Auricrux Executive Operator

on:
  workflow_dispatch:
    inputs:
      command:
        description: Optional executive command for this run
        required: false
        type: string
        default: ""
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: auricrux-executive-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate executive engine entrypoint
        run: |
          test -f auricrux/exec/index.mjs || {
            echo "Missing auricrux/exec/index.mjs" >&2
            exit 1
          }

      - name: Run Auricrux Executive Engine
        env:
          AURICRUX_COMMAND: ${{ inputs.command || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GH_TOKEN: ${{ secrets.AURICRUX_GITHUB_TOKEN }}
        run: node auricrux/exec/index.mjs

      - name: Detect repository changes
        id: detect_changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or Update PR
        if: success() && steps.detect_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AURICRUX_GITHUB_TOKEN }}
          commit-message: "Auricrux: system advancement"
          title: "Auricrux: system advancement"
          body: "Autonomous system advancement executed by Auricrux."
          branch: "auricrux/executive"
          base: "main"
          labels: "auricrux-automerge"

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Auricrux Executive Run"
            echo "- Event: ${{ github.event_name }}"
            echo "- Ref: ${{ github.ref_name || 'n/a' }}"
            echo "- Changes detected: ${{ steps.detect_changes.outputs.changed || 'false' }}"
          } >> "$GITHUB_STEP_SUMMARY"
