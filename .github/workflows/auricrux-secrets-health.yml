name: Auricrux Secrets Health

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify cross-repo token
        env:
          AURICRUX_GITHUB_TOKEN: ${{ secrets.AURICRUX_GITHUB_TOKEN }}
        run: bash scripts/ci/verify-auricrux-token.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "## Auricrux secrets health"
            echo "Checked \`AURICRUX_GITHUB_TOKEN\` against auricrux-central and fca-bid-tracker."
            echo "See docs/AURICRUX_CI_SECRETS.md if this job fails."
          } >> "$GITHUB_STEP_SUMMARY"
