name: FCA Live Deployment Proof Stamp

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fca-live-deployment-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stamp-live-deployment-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Verify live deployment
        env:
          AURICRUX_SWA_DEFAULT_HOST: delightful-mushroom-0de67860f.7.azurestaticapps.net
        run: node scripts/verify-live-deployment.mjs

      - name: Stamp live deployment proof
        if: ${{ always() }}
        run: node scripts/stamp-live-deployment-proof.mjs

      - name: Emit live deployment run witness
        if: ${{ always() }}
        run: node scripts/emit-live-deployment-run-witness.mjs

      - name: Validate live deployment proof surface
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-surface.mjs

      - name: Validate live deployment proof workflow contract
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-workflow.mjs

      - name: Validate live deployment run witness
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-run-witness.mjs

      - name: Validate live deployment proof commit signal
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-commit-signal.mjs

      - name: Generate live deployment proof commit signal report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-proof-commit-signal-report.mjs

      - name: Validate live deployment witness commit observation
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-witness-commit-observation.mjs

      - name: Generate live deployment witness commit observation report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-witness-commit-observation-report.mjs

      - name: Validate live deployment CI proof commit observation
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-ci-proof-commit-observation.mjs

      - name: Generate live deployment CI proof commit observation report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-ci-proof-commit-observation-report.mjs

      - name: Validate live deployment proof provenance
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-provenance.mjs

      - name: Generate live deployment proof provenance report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-proof-provenance-report.mjs

      - name: Validate live deployment proof suite
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-suite.mjs

      - name: Generate live deployment proof suite report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-proof-suite-report.mjs

      - name: Commit CI-backed live deployment proof
        if: ${{ always() }}
        run: |
          git config user.name "auricrux-ci"
          git config user.email "auricrux-ci@futurecontractorsofamerica.com"
          git add docs/runtime-proof/live-deployment generated/live-deployment-proof-surface-validation.json generated/live-deployment-proof-surface-validation.md generated/live-deployment-proof-workflow-validation.json generated/live-deployment-proof-workflow-validation.md generated/live-deployment-run-witness-validation.json generated/live-deployment-run-witness-validation.md generated/live-deployment-proof-commit-signal-validation.json generated/live-deployment-proof-commit-signal-validation.md generated/live-deployment-proof-commit-signal-report.json generated/live-deployment-proof-commit-signal-report.md generated/live-deployment-witness-commit-observation-validation.json generated/live-deployment-witness-commit-observation-validation.md generated/live-deployment-witness-commit-observation-report.json generated/live-deployment-witness-commit-observation-report.md generated/live-deployment-ci-proof-commit-observation-validation.json generated/live-deployment-ci-proof-commit-observation-validation.md generated/live-deployment-ci-proof-commit-observation-report.json generated/live-deployment-ci-proof-commit-observation-report.md generated/live-deployment-proof-provenance-validation.json generated/live-deployment-proof-provenance-validation.md generated/live-deployment-proof-provenance-report.json generated/live-deployment-proof-provenance-report.md generated/live-deployment-proof-suite-validation.json generated/live-deployment-proof-suite-validation.md generated/live-deployment-proof-suite-report.json generated/live-deployment-proof-suite-report.md
          if git diff --cached --quiet; then
            echo "No CI-backed live deployment proof changes to commit."
          else
            git commit -m "Persist CI-backed live deployment proof for run ${GITHUB_RUN_ID}"
            git push
          fi
