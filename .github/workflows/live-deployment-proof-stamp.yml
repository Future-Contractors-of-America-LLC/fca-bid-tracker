name: FCA Live Deployment Proof Stamp

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fca-live-deployment-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stamp-live-deployment-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Verify live deployment
        env:
          AURICRUX_SWA_DEFAULT_HOST: delightful-mushroom-0de67860f.7.azurestaticapps.net
        run: node scripts/verify-live-deployment.mjs || true

      - name: Stamp live deployment proof
        if: ${{ always() }}
        run: node scripts/stamp-live-deployment-proof.mjs

      - name: Emit live deployment run witness
        if: ${{ always() }}
        run: node scripts/emit-live-deployment-run-witness.mjs

      - name: Validate live deployment proof surface
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-surface.mjs || true

      - name: Validate live deployment proof workflow contract
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-workflow.mjs

      - name: Generate live deployment proof workflow report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-proof-workflow-report.mjs

      - name: Validate live deployment proof zero dependency workflow
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-zero-dependency-workflow.mjs

      - name: Generate live deployment proof zero dependency workflow report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-proof-zero-dependency-workflow-report.mjs

      - name: Validate live deployment run witness
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-run-witness.mjs || true

      - name: Validate live deployment run witness workflow
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-run-witness-workflow.mjs

      - name: Generate live deployment run witness workflow report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-run-witness-workflow-report.mjs

      - name: Validate live deployment proof commit signal
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-commit-signal.mjs || true

      - name: Generate live deployment proof commit signal report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-proof-commit-signal-report.mjs

      - name: Validate live deployment witness commit observation
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-witness-commit-observation.mjs || true

      - name: Generate live deployment witness commit observation report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-witness-commit-observation-report.mjs

      - name: Validate live deployment CI proof commit observation
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-ci-proof-commit-observation.mjs || true

      - name: Generate live deployment CI proof commit observation report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-ci-proof-commit-observation-report.mjs

      - name: Validate live deployment proof provenance
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-provenance.mjs || true

      - name: Generate live deployment proof provenance report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-proof-provenance-report.mjs

      - name: Capture live deployment transition target
        if: ${{ always() }}
        run: node scripts/capture-live-deployment-transition-target.mjs

      - name: Validate live deployment current head verifier
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-current-head-verifier.mjs || true

      - name: Generate live deployment current head verifier report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-current-head-verifier-report.mjs

      - name: Validate live deployment metadata transition state
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-metadata-transition-state.mjs || true

      - name: Generate live deployment metadata transition state report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-metadata-transition-state-report.mjs

      - name: Validate live deployment proof suite
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-suite.mjs || true

      - name: Generate live deployment proof suite report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-proof-suite-report.mjs

      - name: Validate live deployment proof bundle readiness
        if: ${{ always() }}
        run: node scripts/validate-live-deployment-proof-bundle-readiness.mjs || true

      - name: Generate live deployment proof bundle readiness report
        if: ${{ always() }}
        run: node scripts/generate-live-deployment-proof-bundle-readiness-report.mjs

      - name: Validate build validation live proof coverage
        if: ${{ always() }}
        run: npm run validate:build-validation-live-proof-coverage || true

      - name: Generate build validation live proof coverage report
        if: ${{ always() }}
        run: npm run generate:build-validation-live-proof-coverage-report

      - name: Validate live proof stamp coverage
        if: ${{ always() }}
        run: node scripts/validate-live-proof-stamp-coverage.mjs || true

      - name: Generate live proof stamp coverage report
        if: ${{ always() }}
        run: node scripts/generate-live-proof-stamp-coverage-report.mjs

      - name: Validate live proof stamp persistence wiring
        if: ${{ always() }}
        run: node scripts/validate-live-proof-stamp-persistence-wiring.mjs

      - name: Generate live proof stamp persistence wiring report
        if: ${{ always() }}
        run: node scripts/generate-live-proof-stamp-persistence-wiring-report.mjs

      - name: Validate live proof persisted artifact surface
        if: ${{ always() }}
        run: node scripts/validate-live-proof-persisted-artifact-surface.mjs || true

      - name: Generate live proof persisted artifact surface report
        if: ${{ always() }}
        run: node scripts/generate-live-proof-persisted-artifact-surface-report.mjs

      - name: Validate live proof persisted control bundle
        if: ${{ always() }}
        run: node scripts/validate-live-proof-persisted-control-bundle.mjs || true

      - name: Generate live proof persisted control bundle report
        if: ${{ always() }}
        run: node scripts/generate-live-proof-persisted-control-bundle-report.mjs

      - name: Validate live proof witness observed state
        if: ${{ always() }}
        run: node scripts/validate-live-proof-witness-observed-state.mjs || true

      - name: Generate live proof witness observed state report
        if: ${{ always() }}
        run: node scripts/generate-live-proof-witness-observed-state-report.mjs

      - name: Validate live proof split state
        if: ${{ always() }}
        run: node scripts/validate-live-proof-split-state.mjs || true

      - name: Generate live proof split state report
        if: ${{ always() }}
        run: node scripts/generate-live-proof-split-state-report.mjs

      - name: Validate first persisted control run gate
        if: ${{ always() }}
        run: node scripts/validate-first-persisted-control-run-gate.mjs || true

      - name: Generate first persisted control run gate report
        if: ${{ always() }}
        run: node scripts/generate-first-persisted-control-run-gate-report.mjs

      - name: Commit CI-backed live deployment proof
        if: ${{ always() }}
        run: |
          git config user.name "auricrux-ci"
          git config user.email "auricrux-ci@futurecontractorsofamerica.com"

          proof_files=(
            docs/runtime-proof/live-deployment
            generated/live-deployment-proof-surface-validation.json
            generated/live-deployment-proof-surface-validation.md
            generated/live-deployment-proof-workflow-validation.json
            generated/live-deployment-proof-workflow-validation.md
            generated/live-deployment-proof-workflow-report.json
            generated/live-deployment-proof-workflow-report.md
            generated/live-deployment-proof-zero-dependency-workflow-validation.json
            generated/live-deployment-proof-zero-dependency-workflow-validation.md
            generated/live-deployment-proof-zero-dependency-workflow-report.json
            generated/live-deployment-proof-zero-dependency-workflow-report.md
            generated/live-deployment-run-witness-workflow-validation.json
            generated/live-deployment-run-witness-workflow-validation.md
            generated/live-deployment-run-witness-workflow-report.json
            generated/live-deployment-run-witness-workflow-report.md
            generated/live-deployment-proof-commit-signal-validation.json
            generated/live-deployment-proof-commit-signal-validation.md
            generated/live-deployment-proof-commit-signal-report.json
            generated/live-deployment-proof-commit-signal-report.md
            generated/live-deployment-witness-commit-observation-validation.json
            generated/live-deployment-witness-commit-observation-validation.md
            generated/live-deployment-witness-commit-observation-report.json
            generated/live-deployment-witness-commit-observation-report.md
            generated/live-deployment-ci-proof-commit-observation-validation.json
            generated/live-deployment-ci-proof-commit-observation-validation.md
            generated/live-deployment-ci-proof-commit-observation-report.json
            generated/live-deployment-ci-proof-commit-observation-report.md
            generated/live-deployment-proof-provenance-validation.json
            generated/live-deployment-proof-provenance-validation.md
            generated/live-deployment-proof-provenance-report.json
            generated/live-deployment-proof-provenance-report.md
            generated/live-deployment-transition-target.json
            generated/live-deployment-transition-target.md
            generated/live-deployment-current-head-verifier-validation.json
            generated/live-deployment-current-head-verifier-validation.md
            generated/live-deployment-current-head-verifier-report.json
            generated/live-deployment-current-head-verifier-report.md
            generated/live-deployment-metadata-transition-state-validation.json
            generated/live-deployment-metadata-transition-state-validation.md
            generated/live-deployment-metadata-transition-state-report.json
            generated/live-deployment-metadata-transition-state-report.md
            generated/live-deployment-proof-suite-validation.json
            generated/live-deployment-proof-suite-validation.md
            generated/live-deployment-proof-suite-report.json
            generated/live-deployment-proof-suite-report.md
            generated/live-deployment-proof-bundle-readiness-validation.json
            generated/live-deployment-proof-bundle-readiness-validation.md
            generated/live-deployment-proof-bundle-readiness-report.json
            generated/live-deployment-proof-bundle-readiness-report.md
            generated/live-proof-stamp-coverage-validation.json
            generated/live-proof-stamp-coverage-validation.md
            generated/live-proof-stamp-coverage-report.json
            generated/live-proof-stamp-coverage-report.md
            generated/live-proof-stamp-persistence-wiring-validation.json
            generated/live-proof-stamp-persistence-wiring-validation.md
            generated/live-proof-stamp-persistence-wiring-report.json
            generated/live-proof-stamp-persistence-wiring-report.md
            generated/live-proof-persisted-artifact-surface-validation.json
            generated/live-proof-persisted-artifact-surface-validation.md
            generated/live-proof-persisted-artifact-surface-report.json
            generated/live-proof-persisted-artifact-surface-report.md
            generated/live-proof-persisted-control-bundle-validation.json
            generated/live-proof-persisted-control-bundle-validation.md
            generated/live-proof-persisted-control-bundle-report.json
            generated/live-proof-persisted-control-bundle-report.md
            generated/live-proof-witness-observed-state-validation.json
            generated/live-proof-witness-observed-state-validation.md
            generated/live-proof-witness-observed-state-report.json
            generated/live-proof-witness-observed-state-report.md
            generated/live-proof-split-state-validation.json
            generated/live-proof-split-state-validation.md
            generated/live-proof-split-state-report.json
            generated/live-proof-split-state-report.md
            generated/first-persisted-control-run-gate-validation.json
            generated/first-persisted-control-run-gate-validation.md
            generated/first-persisted-control-run-gate-report.json
            generated/first-persisted-control-run-gate-report.md
            generated/build-validation-live-proof-coverage-validation.json
            generated/build-validation-live-proof-coverage-validation.md
            generated/build-validation-live-proof-coverage-report.json
            generated/build-validation-live-proof-coverage-report.md
          )

          persist_dir="$(mktemp -d)"
          for f in "${proof_files[@]}"; do
            if [ -d "$f" ]; then
              mkdir -p "$persist_dir/$f"
              cp -R "$f/." "$persist_dir/$f/" || true
            elif [ -f "$f" ]; then
              mkdir -p "$persist_dir/$(dirname "$f")"
              cp "$f" "$persist_dir/$f" || true
            fi
          done

          retries="1 2 3"
          for retry_id in $retries; do
            echo "Live deployment proof persistence retry ${retry_id}"
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main

            for f in "${proof_files[@]}"; do
              if [ -d "$persist_dir/$f" ]; then
                mkdir -p "$f"
                cp -R "$persist_dir/$f/." "$f/" || true
              elif [ -f "$persist_dir/$f" ]; then
                mkdir -p "$(dirname "$f")"
                cp "$persist_dir/$f" "$f" || true
              fi
            done

            git add "${proof_files[@]}"
            git reset docs/runtime-proof/live-deployment/live_deployment_ci_run_witness.json docs/runtime-proof/live-deployment/live_deployment_ci_run_witness.md generated/live-deployment-run-witness-validation.json generated/live-deployment-run-witness-validation.md || true

            if git diff --cached --quiet; then
              echo "No CI-backed live deployment proof changes to commit."
              exit 0
            fi

            git commit -m "Persist CI-backed live deployment proof for run ${GITHUB_RUN_ID}"
            if git push origin HEAD:main; then
              exit 0
            fi

            git reset --hard
            git clean -fd
            sleep 5
          done

          echo "Failed to persist CI-backed live deployment proof after retry budget."
          exit 1
