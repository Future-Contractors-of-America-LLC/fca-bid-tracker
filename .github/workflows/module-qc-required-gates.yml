name: Module QC Required Gates

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: module-qc-required-gates-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required-module-qc-gates:
    name: required-module-qc-gates
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Required module capability gate
        run: npm run validate:module-capability-coverage

      - name: Required competitive benchmark gate
        run: npm run audit:competitive-modules

      - name: Required module ranking gate
        run: npm run report:module-competitive-ranking

      - name: Standards freeze gate for portal routes
        run: npm run validate:portal-standards-freeze

      - name: Generate weekly executive scorecard
        run: npm run generate:weekly-executive-scorecard

      - name: Generate release communications artifacts
        run: npm run generate:release-communications

      - name: Upload module QC required gate artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: module-qc-required-gates-artifacts
          path: |
            docs/qc/module-capability-coverage-report.json
            docs/qc/module-capability-coverage-report.md
            docs/qc/competitive-module-audit-report.json
            docs/qc/competitive-module-audit-report.md
            docs/qc/module-competitive-ranking-report.json
            docs/qc/module-competitive-ranking-report.md
            docs/qc/portal-standards-freeze-report.json
            docs/qc/portal-standards-freeze-report.md
            docs/qc/weekly-executive-scorecard.json
            docs/qc/weekly-executive-scorecard.md
            docs/qc/release-claim-proof-map.json
            docs/qc/release-communications-internal.md
            docs/qc/release-communications-external.md
