name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:  # ✅ allows manual rebuild
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    name: Build and Deploy Job
    runs-on: ubuntu-latest

    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      # ✅ Always pull FULL repo state (fixes stale builds)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ✅ CRITICAL: ensures latest commit is used

      # ✅ Debug step — proves what Azure is building
      - name: Print current commit
        run: |
          echo "Current commit:"
          git log -1

      # ✅ Debug file structure (this is GOLD for troubleshooting)
      - name: Verify file structure
        run: |
          echo "Repo root:"
          ls -la
          echo "SRC contents:"
          ls -la src
          echo "Components:"
          ls -la src/components || echo "components missing"

      # ✅ FORCE fresh Node install (prevents stale dependency cache)
      - name: Set Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # ✅ FORCE Vite to rebuild from scratch
      - name: Build app
        run: |
          npm run build

      # ✅ Deploy (only after confirmed build)
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_GROUND_0724D730F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          app_location: "/"
          api_location: "api"
          output_location: "dist"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_GROUND_0724D730F }}
          action: "close"
