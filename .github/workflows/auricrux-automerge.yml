name: Auricrux Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: |
      startsWith(github.head_ref, 'auricrux/') ||
      startsWith(github.head_ref, 'sprint/laptop/') ||
      startsWith(github.head_ref, 'chps/')

    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${PR_URL}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
