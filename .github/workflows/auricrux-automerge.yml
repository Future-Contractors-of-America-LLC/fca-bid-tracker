name: Auricrux Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Evaluate merge eligibility
        id: eligibility
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          ELIGIBLE="false"
          REASON="No automerge signal found"

          if echo ",$PR_LABELS," | grep -q ",auricrux-automerge,"; then
            ELIGIBLE="true"
            REASON="auricrux-automerge label present"
          elif [[ "$PR_HEAD_REF" == auricrux/* ]]; then
            ELIGIBLE="true"
            REASON="auricrux/* branch convention"
          fi

          echo "eligible=$ELIGIBLE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (squash)
        if: steps.eligibility.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto

      - name: Summary
        if: always()
        run: |
          {
            echo "## Auricrux Auto Merge"
            echo "- Eligible: ${{ steps.eligibility.outputs.eligible || 'false' }}"
            echo "- Reason: ${{ steps.eligibility.outputs.reason || 'n/a' }}"
            echo "- PR: #${{ github.event.pull_request.number }}"
          } >> "$GITHUB_STEP_SUMMARY"
