name: Auricrux Autonomous Runner

# Heartbeat-only rail. Schedule disabled — it force-pushed every 6h and flooded
# Actions with action_required / PR CI noise. Keep workflow_dispatch for intentional runs.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-auricrux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Auricrux task
        run: |
          mkdir -p generated
          echo "Auricrux execution cycle $(date -u)" > generated/auricrux-run.txt

      - name: Push autonomous branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B auricrux/auto-cycle
          git add generated/auricrux-run.txt
          git commit -m "Auricrux autonomous execution cycle"
          git push origin auricrux/auto-cycle --force-with-lease

      - name: Create or update pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AURICRUX_GITHUB_TOKEN: ${{ secrets.AURICRUX_GITHUB_TOKEN }}
        run: |
          bash scripts/ci/create-auricrux-pr.sh \
            main \
            auricrux/auto-cycle \
            "Auricrux autonomous execution" \
            "Automated execution cycle using FCA autonomy rules."
