name: FCA Runtime Smoke Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fca-runtime-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture build evidence
        run: npm run capture:build-evidence

      - name: Validate runtime proof integrity
        if: ${{ always() }}
        run: npm run validate:runtime-proof-integrity

      - name: Validate runtime smoke proof lane
        if: ${{ always() }}
        run: npm run validate:runtime-smoke-proof-lane

      - name: Validate runtime smoke report emission
        if: ${{ always() }}
        run: npm run validate:runtime-smoke-report-emission

      - name: Execute bounded runtime smoke checks
        run: npm run validate:runtime-smoke

      - name: Capture CI proof index
        if: ${{ always() }}
        run: npm run capture:ci-proof-index

      - name: Generate runtime proof integrity evidence
        if: ${{ always() }}
        run: npm run generate:runtime-proof-integrity-report

      - name: Generate runtime smoke proof lane evidence
        if: ${{ always() }}
        run: npm run generate:runtime-smoke-proof-lane-report

      - name: Generate runtime smoke report emission evidence
        if: ${{ always() }}
        run: npm run generate:runtime-smoke-report-emission-report

      - name: Persist runtime proof artifacts into repo
        if: ${{ always() }}
        run: |
          mkdir -p docs/runtime-proof/runtime-smoke
          cp generated/runtime-smoke-check-report.json docs/runtime-proof/runtime-smoke/runtime-smoke-check-report.json || true
          cp generated/runtime-smoke-check-report.md docs/runtime-proof/runtime-smoke/runtime-smoke-check-report.md || true
          cp generated/build-evidence-report.json docs/runtime-proof/runtime-smoke/build-evidence-report.json || true
          cp generated/build-evidence-report.md docs/runtime-proof/runtime-smoke/build-evidence-report.md || true
          cp generated/ci-proof-index.json docs/runtime-proof/runtime-smoke/ci-proof-index.json || true
          cp generated/ci-proof-index.md docs/runtime-proof/runtime-smoke/ci-proof-index.md || true
          cp generated/runtime-proof-integrity-report.json docs/runtime-proof/runtime-smoke/runtime-proof-integrity-report.json || true
          cp generated/runtime-proof-integrity-report.md docs/runtime-proof/runtime-smoke/runtime-proof-integrity-report.md || true
          cp generated/runtime-smoke-proof-lane-report.json docs/runtime-proof/runtime-smoke/runtime-smoke-proof-lane-report.json || true
          cp generated/runtime-smoke-proof-lane-report.md docs/runtime-proof/runtime-smoke/runtime-smoke-proof-lane-report.md || true
          cp generated/runtime-smoke-report-emission-report.json docs/runtime-proof/runtime-smoke/runtime-smoke-report-emission-report.json || true
          cp generated/runtime-smoke-report-emission-report.md docs/runtime-proof/runtime-smoke/runtime-smoke-report-emission-report.md || true

      - name: Publish smoke-check summary
        if: ${{ always() }}
        run: |
          if [ -f generated/runtime-smoke-check-report.md ]; then
            cat generated/runtime-smoke-check-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Runtime smoke-check report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/build-evidence-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/build-evidence-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Build evidence report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/ci-proof-index.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/ci-proof-index.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "CI proof index missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/runtime-proof-integrity-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/runtime-proof-integrity-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Runtime proof integrity report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/runtime-smoke-proof-lane-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/runtime-smoke-proof-lane-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Runtime smoke proof lane report missing" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f generated/runtime-smoke-report-emission-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat generated/runtime-smoke-report-emission-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Runtime smoke report emission report missing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload smoke-check artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: fca-runtime-smoke-${{ github.run_id }}
          path: |
            generated/runtime-smoke-check-report.json
            generated/runtime-smoke-check-report.md
            generated/build-evidence-report.json
            generated/build-evidence-report.md
            generated/ci-proof-index.json
            generated/ci-proof-index.md
            generated/runtime-proof-integrity-report.json
            generated/runtime-proof-integrity-report.md
            generated/runtime-smoke-proof-lane-report.json
            generated/runtime-smoke-proof-lane-report.md
            generated/runtime-smoke-report-emission-report.json
            generated/runtime-smoke-report-emission-report.md
          if-no-files-found: warn

      - name: Commit runtime proof artifacts
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "auricrux-ci"
          git config user.email "auricrux-ci@futurecontractorsofamerica.com"
          git add docs/runtime-proof/runtime-smoke
          if git diff --cached --quiet; then
            echo "No runtime proof artifact changes to commit."
          else
            git commit -m "Persist runtime smoke proof artifacts for run ${GITHUB_RUN_ID}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
