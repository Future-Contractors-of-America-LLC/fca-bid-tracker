name: FCA Live Deployment Run Witness

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fca-live-deployment-run-witness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emit-live-run-witness:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Emit live deployment run witness
        run: node scripts/emit-live-deployment-run-witness.mjs

      - name: Validate live deployment run witness
        run: node scripts/validate-live-deployment-run-witness.mjs

      - name: Commit live deployment run witness
        if: ${{ always() }}
        run: |
          git config user.name "auricrux-ci"
          git config user.email "auricrux-ci@futurecontractorsofamerica.com"
          git add docs/runtime-proof/live-deployment/live_deployment_ci_run_witness.json docs/runtime-proof/live-deployment/live_deployment_ci_run_witness.md generated/live-deployment-run-witness-validation.json generated/live-deployment-run-witness-validation.md
          if git diff --cached --quiet; then
            echo "No live deployment witness changes to commit."
          else
            tmp_patch="$(mktemp)"
            git diff --cached --binary > "$tmp_patch"
            git reset --hard
            git clean -fd
            retries="1 2 3"
            for retry_id in $retries; do
              echo "Live deployment witness persistence retry ${retry_id}"
              git fetch origin main
              git checkout -B main origin/main
              if git apply --index "$tmp_patch"; then
                git commit -m "Persist live deployment run witness for run ${GITHUB_RUN_ID}"
                if git push origin HEAD:main; then
                  exit 0
                fi
              fi
              git reset --hard
              git clean -fd
              sleep 5
            done
            echo "Failed to persist live deployment run witness after retry budget."
            exit 1
          fi
