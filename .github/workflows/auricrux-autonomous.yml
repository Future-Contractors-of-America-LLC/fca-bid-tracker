name: Auricrux Continuous Advancement Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: auricrux-advancement
  cancel-in-progress: true

jobs:
  advance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run advancement engine
        run: node auricrux_engine.js

      - name: Commit shipped changes
        run: |
          git config user.name "auricrux"
          git config user.email "auricrux@ai.system"
          git add public/product
          git commit -m "Auricrux: ship advancement" || echo "No changes"
          git push
