name: Auricrux Autonomous Build System

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auricrux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No lockfile, skipping npm ci"
          fi

      - name: Run Auricrux Engine
        run: node auricrux_engine.js

      - name: Commit generated files
        run: |
          git config user.name "auricrux"
          git config user.email "auricrux@ai.system"
          git add .
          git commit -m "Auricrux autonomous system build" || echo "No changes"
          git push
