name: Auricrux Continuous Advancement Engine

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  repository_dispatch:
    types: [auricrux_legacy_autonomous]

permissions:
  contents: write

concurrency:
  group: auricrux-advancement-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout canonical branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run advancement engine
        run: node auricrux_engine.js

      - name: Verify SPA build when source changes
        run: |
          if git diff --quiet -- src/ scripts/; then
            echo "No frontend source changes — skipping SPA build gate."
            exit 0
          fi
          npm run build:spa
          node scripts/validate-portal-ux-sweep.mjs

      - name: Commit shipped changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "auricrux"
          git config user.email "auricrux@ai.system"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No advancement changes detected"
            exit 0
          fi
          git add .
          git commit -m "Auricrux: ship advancement" || echo "No changes"
          CURRENT_BRANCH="${GITHUB_REF_NAME:-main}"
          git push origin "HEAD:${CURRENT_BRANCH}"

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Auricrux Legacy Autonomous Engine"
            echo "This workflow no longer owns the primary schedule."
            echo "Primary automation schedule now belongs to .github/workflows/auricrux-control-plane.yml"
            echo "Use this workflow only for bounded/manual execution or repository_dispatch fallback."
          } >> "$GITHUB_STEP_SUMMARY"
