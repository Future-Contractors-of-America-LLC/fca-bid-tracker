name: Workflow Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Validate workflow files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1
