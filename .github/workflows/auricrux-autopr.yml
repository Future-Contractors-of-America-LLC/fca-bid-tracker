name: Auricrux Auto PR

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

concurrency:
  group: auricrux-autopr
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auricrux-autopr:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate bounded maintenance digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p auricrux/system
          GENERATED_AT=$(date -u +"%Y-%m-%d %H:%M UTC")
          cat > AURICRUX_DIGEST.txt <<EOF
Auricrux autonomous maintenance cycle
Generated: ${GENERATED_AT}
Repository: Future-Contractors-of-America-LLC/fca-bid-tracker
Mode: deterministic no-cost maintenance placeholder
Next intent: keep repo autonomy rail active until central control loop delegates a concrete implementation task
EOF
          cp AURICRUX_DIGEST.txt auricrux/system/autopr_latest.txt
          test -s AURICRUX_DIGEST.txt || { echo "AURICRUX_DIGEST.txt was not generated"; exit 1; }

      - name: Upload maintenance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auricrux-autopr-artifacts
          path: |
            AURICRUX_DIGEST.txt
            auricrux/system/autopr_latest.txt
          if-no-files-found: error

      - name: Write job summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Auricrux Auto PR"
            cat AURICRUX_DIGEST.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'Auricrux: autonomous maintenance update'
          title: 'Auricrux: autonomous maintenance update'
          body: |
            Autonomous bounded maintenance update generated by Auricrux.

            This keeps the repo-autonomy rail live while the canonical control loop in `auricrux-central` governs next actions.
          branch: auricrux/auto-maintenance
          base: main
          delete-branch: false
