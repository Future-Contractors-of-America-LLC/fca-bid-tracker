name: Auricrux Auto PR

on:
  workflow_dispatch:
  schedule:
    - cron: "7 */6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  auricrux-autopr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.AURICRUX_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Auricrux no-cost change marker
        run: |
          mkdir -p generated
          echo "Auricrux autonomous run $(date -u)" > generated/auricrux-autopr-heartbeat.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AURICRUX_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "Auricrux: autonomous update"
          title: "Auricrux: autonomous update"
          body: "Autonomous update generated by Auricrux."
          branch: "auricrux/auto-update"
          base: "main"
