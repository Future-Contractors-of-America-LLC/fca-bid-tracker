name: Auricrux Auto PR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  repository_dispatch:
    types: [auricrux_auto_maintenance]

concurrency:
  group: auricrux-autopr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auricrux-autopr:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name || github.event.repository.default_branch || 'main' }}

      - name: Generate bounded maintenance digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p auricrux/system
          GENERATED_AT=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            echo "Auricrux autonomous maintenance cycle"
            echo "Generated: ${GENERATED_AT}"
            echo "Repository: Future-Contractors-of-America-LLC/fca-bid-tracker"
            echo "Mode: deterministic no-cost maintenance placeholder"
            echo "Control Plane: primary schedule ownership moved to .github/workflows/auricrux-control-plane.yml"
            echo "Next intent: keep repo autonomy rail available as a bounded manual/fallback PR path"
          } > AURICRUX_DIGEST.txt
          cp AURICRUX_DIGEST.txt auricrux/system/autopr_latest.txt
          test -s AURICRUX_DIGEST.txt || { echo "AURICRUX_DIGEST.txt was not generated"; exit 1; }

      - name: Upload maintenance artifacts
        uses: actions/upload-artifact@v6
        with:
          name: auricrux-autopr-artifacts
          path: |
            AURICRUX_DIGEST.txt
            auricrux/system/autopr_latest.txt
          if-no-files-found: error

      - name: Write job summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Auricrux Auto PR"
            cat AURICRUX_DIGEST.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'Auricrux: autonomous maintenance update'
          title: 'Auricrux: autonomous maintenance update'
          body: |
            Autonomous bounded maintenance update generated by Auricrux.

            Primary schedule ownership now belongs to `auricrux-control-plane.yml`.
            This workflow remains available as a bounded manual/fallback PR rail.
          branch: auricrux/auto-maintenance
          base: main
          delete-branch: false
