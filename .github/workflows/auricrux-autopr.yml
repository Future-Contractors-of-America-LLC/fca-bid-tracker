name: Auricrux Auto PR

on:
  workflow_dispatch:
  schedule:
    - cron: "7 */6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  auricrux-autopr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Write heartbeat
        run: |
          mkdir -p generated
          echo "Auricrux autonomous run $(date -u)" > generated/auricrux-autopr-heartbeat.txt

      - name: Push autonomous branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B auricrux/auto-update
          git add generated/auricrux-autopr-heartbeat.txt
          git commit -m "Auricrux: autonomous update"
          git push origin auricrux/auto-update --force-with-lease

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.AURICRUX_GITHUB_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::AURICRUX_GITHUB_TOKEN is required. GitHub Actions cannot create pull requests in this repository without a classic PAT (repo scope) or enabling workflow PR creation in repo settings."
            exit 1
          fi
          existing="$(gh pr list --repo "${{ github.repository }}" --head auricrux/auto-update --base main --state open --json number --jq '.[0].number // empty')"
          if [ -n "${existing}" ]; then
            echo "Open PR #${existing} already exists for auricrux/auto-update"
            exit 0
          fi
          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head auricrux/auto-update \
            --title "Auricrux: autonomous update" \
            --body "Autonomous update generated by Auricrux." \
            --label auricrux-automerge
