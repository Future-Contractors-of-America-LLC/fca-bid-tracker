name: Auricrux Auto PR

# Heartbeat-only rail. Schedule disabled — it force-pushed every 6h and flooded
# Actions with action_required / PR CI noise. Keep workflow_dispatch for intentional runs.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auricrux-autopr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Write heartbeat
        run: |
          mkdir -p generated
          echo "Auricrux autonomous run $(date -u)" > generated/auricrux-autopr-heartbeat.txt

      - name: Push autonomous branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B auricrux/auto-update
          git add generated/auricrux-autopr-heartbeat.txt
          git commit -m "Auricrux: autonomous update"
          git push origin auricrux/auto-update --force-with-lease

      - name: Create or update pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AURICRUX_GITHUB_TOKEN: ${{ secrets.AURICRUX_GITHUB_TOKEN }}
        run: |
          bash scripts/ci/create-auricrux-pr.sh \
            main \
            auricrux/auto-update \
            "Auricrux: autonomous update" \
            "Autonomous update generated by Auricrux."
