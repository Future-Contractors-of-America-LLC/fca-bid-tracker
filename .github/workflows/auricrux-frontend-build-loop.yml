name: Auricrux Frontend Build Loop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auricrux-frontend-build-loop
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v6

      - name: Resolve cross-repo token
        id: cross_repo_token
        continue-on-error: true
        env:
          AURICRUX_GITHUB_TOKEN: ${{ secrets.AURICRUX_GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          ALLOW_MISSING_CROSS_REPO: "1"
        run: bash scripts/ci/resolve-cross-repo-token.sh Future-Contractors-of-America-LLC/auricrux-central

      - name: Checkout auricrux-central (finance spine validation)
        if: steps.cross_repo_token.outputs.cross_repo_token != ''
        uses: actions/checkout@v6
        with:
          repository: Future-Contractors-of-America-LLC/auricrux-central
          path: auricrux-central-work
          token: ${{ steps.cross_repo_token.outputs.cross_repo_token }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run frontend build loop
        if: steps.cross_repo_token.outputs.cross_repo_token != ''
        env:
          FCA_CENTRAL_ROOT: ${{ github.workspace }}/auricrux-central-work
        run: node scripts/frontend_build_loop.mjs

      - name: Skip frontend build loop when cross-repo token is missing
        if: steps.cross_repo_token.outputs.cross_repo_token == ''
        run: echo "Skipping frontend build loop because cross-repo token is not configured."

      - name: Commit loop artifacts
        run: |
          git config user.name "auricrux-loop"
          git config user.email "auricrux-loop@users.noreply.github.com"
          git add auricrux/system/
          if git diff --cached --quiet; then
            echo "No frontend loop changes."
            exit 0
          fi
          git commit -m "Auricrux frontend build loop $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "::warning::Frontend build loop could not push artifacts after rebase; validation still passed."
          fi
