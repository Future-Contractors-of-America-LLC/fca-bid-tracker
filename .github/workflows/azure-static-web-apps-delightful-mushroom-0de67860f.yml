name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AURICRUX_SWA_NAME: fca-frontend
  AURICRUX_SWA_DEFAULT_HOST: delightful-mushroom-0de67860f.7.azurestaticapps.net
  AURICRUX_EXPECTED_HOSTS: futurecontractorsofamerica.com,www.futurecontractorsofamerica.com,app.futurecontractorsofamerica.com,delightful-mushroom-0de67860f.7.azurestaticapps.net
  AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_MUSHROOM_0DE67860F }}

concurrency:
  group: swa-deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    name: Build, Deploy, and Smoke Verify Job
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false

      - name: Assert SWA deployment target configuration
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_MUSHROOM_0DE67860F }}
        run: |
          if test -n "$AZURE_STATIC_WEB_APPS_API_TOKEN"; then
            echo "SWA deployment token present."
            TOKEN_LEN=${#AZURE_STATIC_WEB_APPS_API_TOKEN}
            echo "Token length: ${TOKEN_LEN} characters (expected >40)."
            if [ "$TOKEN_LEN" -lt 40 ]; then
              echo "::warning::SWA deployment token appears too short — may be expired or invalid. Regenerate via Azure Portal → Static Web Apps → fca-frontend → Manage deployment token."
            fi
          else
            echo "::warning::SWA deployment token missing; deployment steps will be skipped."
            echo "::warning::To fix: regenerate the token in Azure Portal and update secret AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_MUSHROOM_0DE67860F. See docs/AZURE_SWA_TOKEN_REGENERATION.md"
          fi
          echo "Target Static Web App: $AURICRUX_SWA_NAME"
          echo "Target default host: $AURICRUX_SWA_DEFAULT_HOST"
          echo "Expected continuity hosts: $AURICRUX_EXPECTED_HOSTS"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run governed build validation
        run: npm run build:system

      - name: Patch live login continuity and visibility marker
        run: node scripts/patch-live-login-continuity.mjs

      - name: Patch live branding visibility (color/logo prominence)
        run: node scripts/patch-live-branding-visibility.mjs

      - name: Generate deployable Azure Functions layout
        run: |
          node scripts/generate-central-proxy-functions.mjs
          node scripts/prepare-api-functions.mjs

      - name: Verify build artifact exists
        run: |
          pwd
          find dist -maxdepth 2 -type f -print | sort
          find api_generated -maxdepth 3 -type f -print | sort
          ls -la
          ls -la dist || true
          ls -la api_generated || true

          test -f dist/index.html
          test -f dist/staticwebapp.config.json
          test -f dist/deployment-status.json
          test -f dist/domain-continuity.json
          test -f dist/runtime-fingerprint.txt
          test -f dist/live-shell-verification.html
          test -f dist/host-binding-audit.html
          test -f dist/api-continuity-audit.html
          grep -q 'id="root"' dist/index.html
          grep -q 'rel="stylesheet"' dist/index.html
          grep -qE '/assets/main-[^"]+\.css' dist/index.html
          grep -q "Cross-host login continuity patch active" dist/index.html
          grep -q "fcaCrossHostLoginPatch" dist/index.html
          grep -q "FCA_LIVE_BRANDING_VISIBILITY_PATCH_V1" dist/styles.css
          test -d dist/assets
          find dist -maxdepth 1 -name 'commit-witness-*.txt' | grep -q .

          test -f api_generated/package.json
          test -f api_generated/host.json
          test -f api_generated/auricrux/index.js
          test -f api_generated/bids/index.js
          test -f api_generated/projects/index.js
          test -f api_generated/academy-lms/function.json
          test -f api_generated/academy-lms/index.js
          test -f api_generated/_lib/academyCatalog.js

      - name: Validate api_generated proxy function structure
        run: |
          echo "=== api_generated structure audit ==="
          FUNC_DIRS=$(find api_generated -maxdepth 1 -mindepth 1 -type d | sort)
          FUNC_COUNT=$(echo "$FUNC_DIRS" | wc -l)
          echo "Found ${FUNC_COUNT} function directories in api_generated/"
          MISSING_INDEX=""
          MISSING_FUNCTION_JSON=""
          for dir in $FUNC_DIRS; do
            name=$(basename "$dir")
            if [ "$name" = "_lib" ]; then continue; fi
            if [ ! -f "$dir/index.js" ]; then
              MISSING_INDEX="$MISSING_INDEX $name"
            fi
            if [ ! -f "$dir/function.json" ]; then
              MISSING_FUNCTION_JSON="$MISSING_FUNCTION_JSON $name"
            fi
          done
          if [ -n "$MISSING_INDEX" ]; then
            echo "::error::Functions missing index.js:${MISSING_INDEX}"
            exit 1
          fi
          if [ -n "$MISSING_FUNCTION_JSON" ]; then
            echo "::error::Functions missing function.json:${MISSING_FUNCTION_JSON}"
            exit 1
          fi
          echo "All proxy function directories contain index.js and function.json."
          echo "=== api_generated/host.json ==="
          cat api_generated/host.json
          echo "=== api_generated/package.json ==="
          cat api_generated/package.json

      - name: Validate proxy function initialization
        run: |
          echo "Validating that proxy functions can be loaded (syntax check)..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            const apiDir = path.join(process.cwd(), 'api_generated');
            const dirs = fs.readdirSync(apiDir, { withFileTypes: true })
              .filter(d => d.isDirectory() && d.name !== '_lib')
              .map(d => d.name);
            let errors = 0;
            for (const name of dirs) {
              const indexPath = path.join(apiDir, name, 'index.js');
              try {
                require(indexPath);
              } catch (e) {
                if (e.code === 'MODULE_NOT_FOUND' && e.message.includes('@azure')) {
                  // Azure SDK not installed in CI — expected, skip
                } else {
                  console.error('Function ' + name + ' failed to load: ' + e.message);
                  errors++;
                }
              }
            }
            if (errors > 0) { process.exit(1); }
            console.log('Proxy function syntax check passed for ' + dirs.length + ' functions.');
          "


        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        env:
          FCA_BLOB_STORAGE_CONNECTION: ${{ secrets.FCA_BLOB_STORAGE_CONNECTION }}
          FCA_ACADEMY_MEDIA_CONTAINER: fca-academy-media
        run: |
          set -euo pipefail
          if [ -z "$FCA_BLOB_STORAGE_CONNECTION" ]; then
            echo "::error::FCA_BLOB_STORAGE_CONNECTION not set — academy WebM/MP3 must publish to blob before slim SWA deploy."
            exit 1
          fi
          az storage container create \
            --name "$FCA_ACADEMY_MEDIA_CONTAINER" \
            --connection-string "$FCA_BLOB_STORAGE_CONNECTION" \
            --public-access blob \
            --only-show-errors
          az storage blob upload-batch \
            --connection-string "$FCA_BLOB_STORAGE_CONNECTION" \
            --destination "$FCA_ACADEMY_MEDIA_CONTAINER" \
            --source public/academy/media \
            --pattern "*.webm" \
            --destination-path academy/media \
            --overwrite \
            --only-show-errors
          az storage blob upload-batch \
            --connection-string "$FCA_BLOB_STORAGE_CONNECTION" \
            --destination "$FCA_ACADEMY_MEDIA_CONTAINER" \
            --source public/academy/media \
            --pattern "*.mp3" \
            --destination-path academy/media \
            --overwrite \
            --only-show-errors
          WEBM_COUNT=$(find public/academy/media -name '*.webm' | wc -l)
          echo "Uploaded ${WEBM_COUNT} academy WebM file(s) to ${FCA_ACADEMY_MEDIA_CONTAINER}"

      - name: Verify academy blob CDN reachability
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        env:
          FCA_ACADEMY_MEDIA_CDN_BASE: ${{ vars.FCA_ACADEMY_MEDIA_CDN_BASE }}
        run: |
          set -euo pipefail
          if [ -z "$FCA_ACADEMY_MEDIA_CDN_BASE" ]; then
            echo "::error::FCA_ACADEMY_MEDIA_CDN_BASE repo variable not set (e.g. https://<account>.blob.core.windows.net/fca-academy-media)."
            exit 1
          fi
          SAMPLE=$(find public/academy/media -name '*.webm' -print -quit)
          if [ -z "$SAMPLE" ]; then
            echo "No academy WebM samples to verify."
            exit 0
          fi
          REL="${SAMPLE#public/}"
          URL="${FCA_ACADEMY_MEDIA_CDN_BASE%/}/${REL}"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "HEAD $URL => HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::error::Academy blob CDN verification failed (HTTP $CODE)"
            exit 1
          fi

      - name: Slim SWA dist (offload academy WebM/MP3 to blob CDN)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        env:
          FCA_ACADEMY_MEDIA_CDN_BASE: ${{ vars.FCA_ACADEMY_MEDIA_CDN_BASE }}
        run: npm run prepare:swa-deploy

      - name: Archive governed deployment payload
        run: |
          mkdir -p workspace
          tar -czf workspace/governed_swa_payload.tgz dist api_generated staticwebapp.config.json package.json package-lock.json

      - name: Skip PR preview deployment to preserve staging capacity
        if: github.event_name == 'pull_request'
        run: |
          echo "Pull request validation completed."
          echo "Azure Static Web Apps preview deployment intentionally skipped to avoid staging-environment exhaustion."

      - name: Build And Deploy
        id: builddeploy
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_MUSHROOM_0DE67860F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: dist
          api_location: api_generated
          output_location: ''

      - name: Post-deploy live domain smoke verification
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        continue-on-error: true
        id: smokecheck
        run: npm run verify:live-deployment
        env:
          AURICRUX_LIVE_VERIFY_ATTEMPTS: '20'
          AURICRUX_LIVE_VERIFY_DELAY_MS: '30000'
          AURICRUX_LIVE_VERIFY_HOSTS: ${{ env.AURICRUX_EXPECTED_HOSTS }}
          AURICRUX_SWA_DEFAULT_HOST: ${{ env.AURICRUX_SWA_DEFAULT_HOST }}
          AURICRUX_SWA_NAME: ${{ env.AURICRUX_SWA_NAME }}
          AURICRUX_LIVE_VERIFY_NONBLOCKING: '1'

      - name: Smoke verification result summary
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        run: |
          if [ -f workspace/live_deployment_smoke_failures.txt ] && [ -s workspace/live_deployment_smoke_failures.txt ]; then
            echo "::warning::Post-deploy smoke verification reported failures. Deployment proceeded. Review live-deployment-smoke artifact."
            cat workspace/live_deployment_smoke_failures.txt
          else
            echo "Post-deploy smoke verification passed."
          fi

      - name: Upload live deployment smoke artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-deployment-smoke
          path: |
            workspace/governed_swa_payload.tgz
            workspace/live_deployment_smoke_summary.json
            workspace/live_deployment_smoke_failures.txt
          if-no-files-found: warn

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_MUSHROOM_0DE67860F }}
          action: close
