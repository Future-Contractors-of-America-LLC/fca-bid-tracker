name: GitHub Pages redirect

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/github-pages-redirect.yml"
      - "docs/index.html"
      - "docs/pages-site/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages-redirect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Assert legacy Pages redirect source
        shell: bash
        run: |
          test -f docs/index.html
          grep -q 'https://futurecontractorsofamerica.com/' docs/index.html
          grep -q 'https://app.futurecontractorsofamerica.com/' docs/index.html
