name: Auricrux Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "7 */6 * * *"

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - name: Run Auricrux Engine tick
        env:
          API_BASE: "https://auricrux-central.azurewebsites.net/api/bids"
        run: |
          echo "[Auricrux] Tick..."
          echo "[Auricrux] API_BASE=$API_BASE"
