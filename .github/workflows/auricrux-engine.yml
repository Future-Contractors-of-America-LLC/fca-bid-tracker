name: Auricrux Engine (Scheduler)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [auricrux_bid_cycle]
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  group: auricrux-engine-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auricrux-engine-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run Auricrux Engine tick
        env:
          API_BASE: "https://auricrux-bid-api-node-ftcueggjg4b0ehbs.centralus-01.azurewebsites.net/api/bids"
        run: |
          echo "[Auricrux] Tick..."
          echo "[Auricrux] API_BASE=$API_BASE"

          node <<'NODE'
          const API = process.env.API_BASE;

          async function main() {
            if (!API) {
              throw new Error("API_BASE is required");
            }

            console.log("[Auricrux] Fetching bids...");
            const getResponse = await fetch(API);

            if (!getResponse.ok) {
              throw new Error(`GET failed: ${getResponse.status}`);
            }

            const bids = await getResponse.json();

            if (!Array.isArray(bids) || bids.length === 0) {
              console.log("[Auricrux] No bids available.");
              return;
            }

            const actionable = bids.filter((bid) => {
              if (!bid || typeof bid !== "object") return false;
              const status = String(bid.status || "").toLowerCase();
              return status !== "auricrux-reviewed";
            });

            console.log(`[Auricrux] ${bids.length} total bid(s), ${actionable.length} actionable.`);

            if (actionable.length === 0) {
              console.log("[Auricrux] Nothing to update.");
              return;
            }

            let updatedCount = 0;

            for (const bid of actionable) {
              const bidId = bid.id || bid.intakeId || "unknown";
              const nextAction =
                bid.auricruxRecommendation ||
                bid.nextAction ||
                "Auricrux review complete. Prepare next bid action.";

              const updatedBid = {
                ...bid,
                status: "auricrux-reviewed",
                nextAction,
                auricruxReviewedAt: new Date().toISOString(),
              };

              console.log(`[Auricrux] Updating bid ${bidId}...`);

              const postResponse = await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updatedBid),
              });

              if (!postResponse.ok) {
                const errorText = await postResponse.text();
                throw new Error(`POST failed for ${bidId}: ${postResponse.status} ${errorText}`);
              }

              updatedCount += 1;
            }

            console.log(`[Auricrux] Scheduler update complete. Updated ${updatedCount} bid(s).`);
          }

          main().catch((error) => {
            console.error("[Auricrux] Scheduler failed:");
            console.error(error);
            process.exit(1);
          });
          NODE
