name: Auricrux Engine (Scheduler)

on:
  workflow_dispatch:

jobs:
  auricrux-engine-tick:
    runs-on: ubuntu-latest

    steps:
      - name: Run Auricrux Engine tick
        env:
          API_BASE: "https://auricrux-bid-api-node-ftcueggjg4b0ehbs.centralus-01.azurewebsites.net/api/bids"
        run: |
          echo "[Auricrux] Tick..."
          echo "[Auricrux] API_BASE=$API_BASE"

          RESPONSE=$(curl -sS "$API_BASE")
          echo "[Auricrux] Response:"
          echo "$RESPONSE"

          if [ "$RESPONSE" = "[]" ]; then
            echo "[Auricrux] No bids available."
          else
            echo "[Auricrux] Bids received."
          fi
