name: Auricrux Control Plane

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Automation mode"
        required: true
        default: "status"
        type: choice
        options:
          - status
          - executive
          - engine
  repository_dispatch:
    types: [auricrux_control_plane]
  schedule:
    - cron: "11,41 * * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: auricrux-control-plane-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  control-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name || github.event.repository.default_branch || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Resolve requested mode
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          EVENT_NAME="${GITHUB_EVENT_NAME}"
          MODE="status"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          elif [ "$EVENT_NAME" = "repository_dispatch" ]; then
            MODE="${{ github.event.client_payload.mode || 'status' }}"
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "event_name=$EVENT_NAME" >> "$GITHUB_OUTPUT"

      - name: Update repo-backed control-plane state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p auricrux/system public/auricrux/control-plane public/auricrux/run-digest
          node <<'NODE'
          const fs = require('fs');
          const statePath = 'auricrux/system/control-plane.json';
          const systemStatePath = 'auricrux/system/system_state.json';
          const nextActionPath = 'auricrux/system/next_action.json';
          const workQueuePath = 'auricrux/system/work_queue.json';
          const runDigestPath = 'auricrux/system/run_digest.json';
          const publicControlPath = 'public/auricrux/control-plane/index.json';
          const publicDigestPath = 'public/auricrux/run-digest/index.json';
          const mode = process.env.MODE;
          const eventName = process.env.EVENT_NAME;
          const now = new Date().toISOString();

          const readJson = (path, fallback) => {
            if (!fs.existsSync(path)) return fallback;
            try {
              return JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch {
              return fallback;
            }
          };

          let state = readJson(statePath, {
            version: 1,
            controller: 'auricrux-control-plane',
            status: 'online',
            preferredPath: 'github-actions-control-plane',
            lastRunUtc: null,
            lastMode: null,
            lastEvent: null,
            lastOutcome: null,
            history: []
          });

          let systemState = readJson(systemStatePath, {
            version: 1,
            system: 'FCA Contractor Command',
            automation: {
              authorityMode: 'continuous_automation',
              canonicalWriter: 'auricrux-control-plane',
              currentMode: 'status',
              currentPhase: 'flagship-spine-buildout',
              currentPacket: 'machine-native-control-loops-v1',
              status: 'online'
            },
            productSpine: {
              flagship: 'FCA Contractor Command',
              requiredObjects: ['lead', 'opportunity', 'project', 'file', 'audit_event'],
              currentFocus: ['project-spine', 'file-spine', 'audit-spine']
            },
            lastUpdatedUtc: null
          });

          let nextAction = readJson(nextActionPath, {
            version: 1,
            id: 'MNCL-001',
            title: 'Implement Project/File/Audit control-loop wiring as the canonical next product build action',
            mode: 'build',
            priority: 'critical',
            status: 'ready',
            owner: 'auricrux-control-plane',
            blockedBy: [],
            produces: [
              'project entity wiring',
              'file spine routing',
              'audit event persistence contract'
            ],
            updatedAtUtc: null
          });

          const defaultWorkQueue = {
            version: 2,
            queueName: 'fca-unified-queue',
            preservationLock: true,
            preservationNote: 'Revenue sprint is additive only. See docs/revenue-sprint/REVENUE_SPRINT_PRESERVATION_RULES.md',
            updatedAtUtc: null,
            items: [
              { id: 'IP-MKT-001', title: 'Brand specimens and /ip notice', lane: 'ip-market', priority: 'critical', status: 'completed', locked: true },
              { id: 'MNCL-001', title: 'Project spine execution baseline', lane: 'machine-native', priority: 'critical', status: 'ready', locked: true },
              { id: 'MNCL-002', title: 'File spine execution baseline', lane: 'machine-native', priority: 'critical', status: 'queued', locked: true },
              { id: 'MNCL-003', title: 'Audit event persistence baseline', lane: 'governance', priority: 'high', status: 'queued', locked: true },
              { id: 'REV-007', title: 'Startup $99/mo subscription payment link', lane: 'revenue-sprint', priority: 'high', status: 'ready' }
            ]
          };

          let workQueue = readJson(workQueuePath, defaultWorkQueue);

          state.lastRunUtc = now;
          state.lastMode = mode;
          state.lastEvent = eventName;
          state.lastOutcome = 'running';
          state.history = Array.isArray(state.history) ? state.history : [];
          state.history.unshift({ at: now, event: eventName, mode, outcome: 'running' });
          state.history = state.history.slice(0, 20);

          systemState.lastUpdatedUtc = now;
          systemState.automation.currentMode = mode;
          systemState.automation.status = 'running';

          nextAction.updatedAtUtc = now;
          workQueue.updatedAtUtc = now;

          const digest = {
            version: 1,
            controller: 'auricrux-control-plane',
            generatedAtUtc: now,
            event: eventName,
            mode,
            outcome: 'running',
            canonicalStateFiles: [
              'auricrux/system/control-plane.json',
              'auricrux/system/system_state.json',
              'auricrux/system/next_action.json',
              'auricrux/system/work_queue.json',
              'auricrux/system/run_digest.json'
            ],
            nextAction: {
              id: nextAction.id,
              title: nextAction.title,
              status: nextAction.status
            },
            queueDepth: Array.isArray(workQueue.items) ? workQueue.items.length : 0,
            status: 'running'
          };

          const write = (path, data) => fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          write(statePath, state);
          write(systemStatePath, systemState);
          write(nextActionPath, nextAction);
          write(workQueuePath, workQueue);
          write(runDigestPath, digest);
          write(publicControlPath, state);
          write(publicDigestPath, digest);
          NODE
        env:
          MODE: ${{ steps.resolve.outputs.mode }}
          EVENT_NAME: ${{ steps.resolve.outputs.event_name }}

      - name: Run executive path
        if: steps.resolve.outputs.mode == 'executive'
        env:
          AURICRUX_COMMAND: control-plane-executive
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GH_TOKEN: ${{ secrets.AURICRUX_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: node auricrux/exec/index.mjs

      - name: Run engine path
        if: steps.resolve.outputs.mode == 'engine'
        run: node auricrux_engine.js

      - name: Finalize control-plane state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p auricrux/system public/auricrux/control-plane public/auricrux/run-digest
          node <<'NODE'
          const fs = require('fs');
          const statePath = 'auricrux/system/control-plane.json';
          const systemStatePath = 'auricrux/system/system_state.json';
          const nextActionPath = 'auricrux/system/next_action.json';
          const workQueuePath = 'auricrux/system/work_queue.json';
          const runDigestPath = 'auricrux/system/run_digest.json';
          const publicControlPath = 'public/auricrux/control-plane/index.json';
          const publicDigestPath = 'public/auricrux/run-digest/index.json';
          const mode = process.env.MODE;
          const eventName = process.env.EVENT_NAME;
          const jobStatus = process.env.JOB_STATUS;
          const now = new Date().toISOString();
          const read = (path) => JSON.parse(fs.readFileSync(path, 'utf8'));
          const write = (path, data) => fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');

          let state = read(statePath);
          let systemState = read(systemStatePath);
          let nextAction = read(nextActionPath);
          let workQueue = read(workQueuePath);
          let digest = read(runDigestPath);

          state.lastRunUtc = now;
          state.lastMode = mode;
          state.lastEvent = eventName;
          state.lastOutcome = jobStatus;
          state.history = Array.isArray(state.history) ? state.history : [];
          if (state.history.length > 0) {
            state.history[0] = { at: now, event: eventName, mode, outcome: jobStatus };
          } else {
            state.history.unshift({ at: now, event: eventName, mode, outcome: jobStatus });
          }

          systemState.lastUpdatedUtc = now;
          systemState.automation.currentMode = mode;
          systemState.automation.status = jobStatus;

          nextAction.updatedAtUtc = now;
          workQueue.updatedAtUtc = now;

          digest.generatedAtUtc = now;
          digest.event = eventName;
          digest.mode = mode;
          digest.outcome = jobStatus;
          digest.status = jobStatus;
          digest.nextAction = {
            id: nextAction.id,
            title: nextAction.title,
            status: nextAction.status
          };
          digest.queueDepth = Array.isArray(workQueue.items) ? workQueue.items.length : 0;

          write(statePath, state);
          write(systemStatePath, systemState);
          write(nextActionPath, nextAction);
          write(workQueuePath, workQueue);
          write(runDigestPath, digest);
          write(publicControlPath, state);
          write(publicDigestPath, digest);
          NODE
        env:
          MODE: ${{ steps.resolve.outputs.mode }}
          EVENT_NAME: ${{ steps.resolve.outputs.event_name }}
          JOB_STATUS: ${{ job.status }}

      - name: Commit control-plane updates
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "auricrux"
          git config user.email "auricrux@ai.system"
          git add \
            auricrux/system/control-plane.json \
            auricrux/system/system_state.json \
            auricrux/system/next_action.json \
            auricrux/system/work_queue.json \
            auricrux/system/run_digest.json \
            public/auricrux/control-plane/index.json \
            public/auricrux/run-digest/index.json
          git commit -m "Auricrux: control plane heartbeat" || echo "No control plane changes"
          CURRENT_BRANCH="${GITHUB_REF_NAME:-main}"
          git push origin "HEAD:${CURRENT_BRANCH}" || echo "Control plane push skipped"

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Auricrux Control Plane"
            echo "- Event: ${{ steps.resolve.outputs.event_name }}"
            echo "- Mode: ${{ steps.resolve.outputs.mode }}"
            echo "- Outcome: ${{ job.status }}"
            echo "- Canonical state files: auricrux/system/control-plane.json, auricrux/system/system_state.json, auricrux/system/next_action.json, auricrux/system/work_queue.json, auricrux/system/run_digest.json"
            echo "- Public status surfaces: public/auricrux/control-plane/index.json, public/auricrux/run-digest/index.json"
            echo "- Paths: status = heartbeat plus canonical state write, executive = auricrux/exec/index.mjs, engine = auricrux_engine.js"
          } >> "$GITHUB_STEP_SUMMARY"
